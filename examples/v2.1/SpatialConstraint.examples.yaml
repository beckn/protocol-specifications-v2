# Examples for SpatialConstraint schema

within_circle:
  summary: EV sites within 5 km of a center (via S_DWITHIN)
  value:
    op: S_DWITHIN
    targets: $['beckn:availableAt'][*]['geo']
    geometry:
      type: Point
      coordinates:
        - 77.5946
        - 12.9716
    distanceMeters: 5000

pickup_at_point:
  summary: Pickup at a defined point (GeoJSON Point)
  description: 'Example of a DiscoverRequest spatial constraint representing a specific pickup location. The requester defines a GeoJSON Point as the pickup location, and the server finds providers whose service area **contains** this point.'
  value:
    op: S_CONTAINS
    targets: $['beckn:itemAttributes']['ride:serviceArea']['geo']
    geometry:
      type: Point
      coordinates:
        - 77.5946
        - 12.9716

drop_intersects:
  summary: Provider drop zone intersects user's rectangle
  value:
    op: S_INTERSECTS
    targets: $['beckn:itemAttributes']['ride:dropOff']['geo']
    geometry:
      type: Polygon
      coordinates:
        - - - 77.61
            - 12.92
          - - 77.64
            - 12.92
          - - 77.64
            - 12.95
          - - 77.61
            - 12.95
          - - 77.61
            - 12.92

pickup_location:
  summary: A defined pickup location object
  value:
    geo:
      type: Point
      coordinates:
        - 77.5946
        - 12.9716
    address:
      streetAddress: MG Road
      addressLocality: Bengaluru
      addressRegion: Karnataka
      postalCode: '560001'
      addressCountry: IN
