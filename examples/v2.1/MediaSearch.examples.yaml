# Examples for MediaSearch schema

basic:
  summary: Media search with image
  value:
    media:
      - id: snap-1
        type: image
        url: https://cdn.example.com/user/snaps/ccs2-cable.jpg
        contentType: image/jpeg
    options:
      goals:
        - VISUAL_OBJECT_DETECT
        - TEXT_FROM_IMAGE
      augmentTextSearch: true
