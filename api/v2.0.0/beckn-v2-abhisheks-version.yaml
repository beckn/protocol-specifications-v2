openapi: 3.1.1
info:
  title: Beckn Protocol API — v2.1 Proposal (Contract-centric, backward compatible)
  version: 2.1.0-draft
  description: |
    Draft proposal to generalize Beckn Protocol core objects while preserving backward compatibility.

    Key ideas:
    - Discovery remains **Catalog**-based.
    - Introduce minimal cross-domain **Resource**, **Offer**, **Contract**.
    - From transaction APIs onwards, payloads support:
        (a) legacy **Order** (unchanged), and/or
        (b) new **Contract** (generalized, cross-domain).
    - Backward compatibility is achieved by allowing `message` to carry either `order` or `contract`
      (and optionally both during migration), without changing endpoint names or the Context envelope style.

servers:
  - url: https://staging-api.becknprotocol.io
    description: Staging server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Discovery
  - name: Transaction
  - name: Browser Search
  - name: Catalog Publish

paths:
  /beckn/discover:
    get:
      summary: Discover resources/items across multiple schemas
      description: |
        Search and discover items/resources across registered schema contexts.
        Implementations may return ACK/NACK or a synchronous DiscoverResponse;
        asynchronous results arrive via /beckn/on_discover.
      operationId: discover
      tags: [Discovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverRequest'
      responses:
        '200':
          description: ACK or synchronous DiscoverResponse
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AckResponse'
                  - $ref: '#/components/schemas/DiscoverResponse'
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_discover:
    post:
      summary: On Discover response with catalog data
      description: Callback endpoint returning discovery results as catalogs.
      operationId: onDiscover
      tags: [Discovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverResponse'
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/discover/browser-search:
    get:
      summary: Browser-friendly search API
      description: |
        URL-based search API for browser navigation and direct links using JSONPath expressions.
        Response format is determined by the Accept header.
      operationId: browserSearch
      tags: [Browser Search]
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            type: string
            enum: ["text/html", "application/json"]
            default: "text/html"
        - name: filters
          in: query
          required: false
          schema: { type: string }
          description: URL-encoded JSONPath expression for complex filtering
      responses:
        '200':
          description: Successful search response
          content:
            text/html:
              schema: { type: string }
            application/json:
              schema: { $ref: '#/components/schemas/DiscoverResponse' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: No results found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ----------------------------
  # Transaction APIs (legacy Order OR new Contract)
  # ----------------------------
  /beckn/select:
    post:
      summary: Buyer selects items/offers (returns priced quote)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: select }
                message:
                  description: |
                    Commitment request.
                    - Legacy: `order` containing selected OrderItems/Offers
                    - New: `contract` with proposed commitments (resource/offer refs)
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                    contract:
                      $ref: '#/components/schemas/Contract'
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_select:
    post:
      summary: Provider returns priced quote (order/contract)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_select }
                message:
                  description: |
                    Quote response.
                    - Legacy: priced `order`
                    - New: priced `contract` (agreed/quoted consideration + proposed performance)
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                    contract:
                      $ref: '#/components/schemas/Contract'
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/init:
    post:
      summary: Initialize (party details, performance mode, payment intent)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: init }
                message:
                  description: |
                    Initialization payload.
                    - Legacy: `order` (billing/shipping/fulfillment/payment details)
                    - New: `contract` (parties, proposed performance plan, payment intent)
                  type: object
                  properties:
                    order:
                      $ref: '#/components/schemas/Order'
                    contract:
                      $ref: '#/components/schemas/Contract'
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_init:
    post:
      summary: Provider echoes initialized state (order/contract)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_init }
                message:
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/confirm:
    post:
      summary: Confirm commitment into a binding order/contract
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: confirm }
                message:
                  description: |
                    Confirmation payload.
                    - Legacy: `order`
                    - New: `contract` (status becomes CONFIRMED and commitments are binding)
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_confirm:
    post:
      summary: Provider returns confirmed order/contract
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_confirm }
                message:
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/status:
    post:
      summary: Fetch status for order/contract by id
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: status }
                message:
                  description: Minimal status request; provide `order.beckn:id` or `contract.beckn:id`.
                  type: object
                  properties:
                    order:
                      type: object
                      additionalProperties: false
                      required: [beckn:id]
                      properties:
                        beckn:id:
                          $ref: '#/components/schemas/Order/properties/beckn:id'
                    contract:
                      type: object
                      additionalProperties: false
                      required: [beckn:id]
                      properties:
                        beckn:id:
                          $ref: '#/components/schemas/Contract/properties/beckn:id'
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_status:
    post:
      summary: Provider returns current order/contract (including performance/payment/support/rating refs)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_status }
                message:
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/update:
    post:
      summary: Request mutation (replace, cancel line, address change, reschedule, etc.)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: update }
                message:
                  description: Update request; include the mutated `order` or `contract`.
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_update:
    post:
      summary: Provider returns mutated order/contract
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_update }
                message:
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/cancel:
    post:
      summary: Request cancellation (full or partial)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: cancel }
                message:
                  description: Cancellation request; include the target `order` or `contract` (minimally by id).
                  type: object
                  properties:
                    order:
                      oneOf:
                        - type: object
                          additionalProperties: false
                          required: [beckn:id]
                          properties:
                            beckn:id: { $ref: '#/components/schemas/Order/properties/beckn:id' }
                        - $ref: '#/components/schemas/Order'
                    contract:
                      oneOf:
                        - type: object
                          additionalProperties: false
                          required: [beckn:id]
                          properties:
                            beckn:id: { $ref: '#/components/schemas/Contract/properties/beckn:id' }
                        - $ref: '#/components/schemas/Contract'
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_cancel:
    post:
      summary: Provider returns cancelled order/contract (may include refund/payment updates)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_cancel }
                message:
                  type: object
                  properties:
                    order: { $ref: '#/components/schemas/Order' }
                    contract: { $ref: '#/components/schemas/Contract' }
                  anyOf:
                    - required: [order]
                    - required: [contract]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/support:
    post:
      summary: Request support details for an entity (order/contract/resource/offer/etc.)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: support }
                message:
                  type: object
                  required: [refId, refType]
                  properties:
                    refId:
                      type: string
                      description: ID of the entity for which support is requested.
                    refType:
                      type: string
                      enum: [CONTRACT, ORDER, PERFORMANCE, FULFILLMENT, RESOURCE, OFFER, PROVIDER, AGENT, OTHER]
                    support:
                      $ref: '#/components/schemas/SupportInfo'
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_support:
    post:
      summary: Provider returns support details
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_support }
                message:
                  type: object
                  required: [support]
                  properties:
                    support:
                      $ref: '#/components/schemas/SupportInfo'
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/track:
    post:
      summary: Request tracking handle/link for an active contract/order performance
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: track }
                message:
                  type: object
                  required: [tracking]
                  properties:
                    tracking:
                      type: object
                      required: [id]
                      properties:
                        id: { type: string, description: Tracking identifier }
                        callbackUrl: { type: string, format: uri }
                        mode_hint:
                          type: string
                          enum: [link_only, deep_link, webhook, ws_handle]
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_track:
    post:
      summary: Provider returns tracking handle/link and status
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_track }
                message:
                  type: object
                  required: [tracking]
                  properties:
                    tracking:
                      $ref: '#/components/schemas/TrackAction'
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/rating:
    post:
      summary: Submit a rating for an entity
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: rating }
                message:
                  type: object
                  required: [ratings]
                  properties:
                    ratings:
                      type: array
                      items:
                        $ref: '#/components/schemas/RatingInput'
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/on_rating:
    post:
      summary: Provider acknowledges rating receipt (optional aggregate snapshot)
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action: { const: on_rating }
                message:
                  type: object
                  properties:
                    received:
                      type: boolean
                      default: true
                    aggregate:
                      type: object
                      properties:
                        count: { type: integer, minimum: 0 }
                        value: { type: number, minimum: 0 }
                        best: { type: number, minimum: 0 }
                        worst: { type: number, minimum: 0 }
                    feedbackForm:
                      $ref: '#/components/schemas/Form'
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  # ----------------------------
  # Catalog publish (as-is)
  # ----------------------------
  /beckn/catalog/publish:
    post:
      summary: Publish one or more catalogs for indexing
      tags: [Catalog Publish]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogPublishRequest' }
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

  /beckn/catalog/on_publish:
    post:
      summary: Callback with catalog publish processing results
      tags: [Catalog Publish]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogPublishResponse' }
      responses:
        '200': { $ref: '#/components/responses/Ack200' }
        '400': { $ref: '#/components/responses/Ack400' }
        '500': { $ref: '#/components/responses/Ack500' }

components:
  responses:
    Ack200:
      description: ACK — request received (validation passed)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AckResponse' }
    Ack400:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AckResponse' }
    Ack500:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AckResponse' }

  schemas:
    # ----------------------------
    # Context envelopes (unchanged style)
    # ----------------------------
    DiscoveryContext:
      allOf:
        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications/refs/heads/master/api/transaction/build/transaction.yaml#/components/schemas/Context'
        - type: object
          description: Beckn Context extended for Discovery.
          properties:
            schema_context:
              type: array
              items: { type: string, format: uri }
              description: Optional JSON-LD context URLs indicating entity types to search across

    TransactionContext:
      allOf:
        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications/refs/heads/master/api/transaction/build/transaction.yaml#/components/schemas/Context'
        - type: object
          description: Beckn Context extended for Transaction flows.
          properties:
            network_id:
              type: array
              items: { type: string }
              description: Optional list of addressed networks (routing/allowlisting)
            schema_context:
              type: array
              items: { type: string, format: uri }
              description: Optional JSON-LD context URLs relevant to entities in this transaction

    # ----------------------------
    # Discovery request/response
    # ----------------------------
    DiscoverRequest:
      type: object
      required: [context]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [discover]
        message:
          type: object
          description: Discover payload containing search criteria
          properties:
            text_search: { type: string }
            filters:
              type: object
              properties:
                type: { type: string, enum: [jsonpath], default: jsonpath }
                expression: { type: string }
              required: [type, expression]
            spatial:
              type: array
              items: { $ref: '#/components/schemas/SpatialConstraint' }
            media_search:
              $ref: '#/components/schemas/MediaSearch'
          anyOf:
            - required: [text_search]
            - required: [filters]
            - required: [spatial]
            - required: [filters, spatial]

    DiscoverResponse:
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [on_discover]
        message:
          type: object
          properties:
            catalogs:
              type: array
              items: { $ref: '#/components/schemas/Catalog' }

    # ----------------------------
    # Minimal generalized discovery container
    # ----------------------------
    Catalog:
      type: object
      description: |
        Discovery container returned in /on_discover.
        Backward compatible:
        - legacy: `beckn:items[]` and legacy `beckn:offers[]`
        - new: `beckn:resources[]` and new `beckn:offers[]` (generalized)
      required: ["@context", "@type", "beckn:id", "beckn:descriptor", "beckn:bppId", "beckn:bppUri"]
      anyOf:
        - required: ["beckn:resources"]
        - required: ["beckn:items"]
        - required: ["beckn:offers"]
      additionalProperties: false
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Catalog"]
        beckn:id:
          type: string
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:bppId:
          type: string
        beckn:bppUri:
          type: string
          format: uri
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
        beckn:isActive:
          type: boolean
          default: true
          description: Whether the catalog is active.
        beckn:resources:
          type: array
          items: { $ref: '#/components/schemas/Resource' }
        beckn:items:
          type: array
          description: Legacy items (backward compatibility)
          items: { $ref: '#/components/schemas/Item' }
        beckn:offers:
          type: array
          description: Mixed array of legacy Offer and new generalized Offer.
          items:
            oneOf:
              - $ref: '#/components/schemas/Offer'
              - $ref: '#/components/schemas/LegacyOffer'
        beckn:availableTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this entity.

            If omitted, the entity is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.              

    # =========================================================
    # Minimal Cross-Domain Resource (erstwhile Item)
    # =========================================================
    Resource:
      type: object
      description: >
        A minimal, domain-neutral abstraction representing any discoverable,
        referenceable, or committable unit of value, capability, service,
        entitlement, or asset within the network.

        Examples:
        - A retail product SKU, a mobility ride, a job role, a carbon credit unit,
          a dataset/API entitlement, a training course, a clinic service slot.

        Designed for composability through `beckn:resourceAttributes` where
        domain packs can plug in their specific fields without changing the core.
      required: ["@context", "@type", "beckn:id", "beckn:descriptor"]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Resource"]
        beckn:id:
          type: string
          description: Globally unique identifier of the resource.
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:provider:
          $ref: '#/components/schemas/Provider'
        beckn:isAvailable:
          type: boolean
          default: true
          description: |
            Whether the resource is currently available for discovery/commitment.
            This allows temporary suspension without deleting the resource.
        beckn:availableTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this entity.

            If omitted, the entity is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.                          
        beckn:resourceAttributes:
          $ref: '#/components/schemas/Attributes'

    # =========================================================
    # Minimal Cross-Domain Offer (erstwhile Offer)
    # =========================================================
    Offer:
      type: object
      description: >
        A generalized, cross-domain **Offer** that captures the terms under which
        one or more Resources may be committed.

        Core intent:
        - Support *multiple terms/eligibility/constraints/price points* for the same Resource(s)
        - Support *dynamic* / on-the-fly offers (e.g., bundling, combinational discounts,
          eligibility changes, capacity-aware pricing)

        This mirrors the role of Offer in current Beckn (and schema.org patterns),
        but keeps the shape minimal and composable via `beckn:offerAttributes`.
      required: ["@context", "@type", "beckn:id", "beckn:proposer", "beckn:status"]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Offer schema
        "@type":
          type: string
          description: Type of the core Offer
          enum: ["beckn:Offer"]
        beckn:id:
          type: string
          description: Unique identifier of the offer.
        beckn:status:
          type: string
          description: Current lifecycle state of the offer.
          enum: [ACTIVE, EXPIRED, WITHDRAWN]
        beckn:proposer:
          $ref: '#/components/schemas/Provider'
        beckn:resourceRefs:
          type: array
          description: References (IDs) to resources covered by this offer.
          items: { type: string }
        beckn:addOnRefs:
          type: array
          description: IDs of optional extra Offers or Resources that can be attached.
          items: { type: string }
        beckn:proposedConsideration:
          type: object
          description: Optional proposed exchange value (monetary or otherwise).
          additionalProperties: true
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
        beckn:availableTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this entity.

            If omitted, the entity is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.                        
        beckn:offerAttributes:
          $ref: '#/components/schemas/Attributes'

    # =========================================================
    # Minimal Cross-Domain Contract
    # =========================================================
    Contract:
      type: object
      description: >
        A digitally agreed commitment between two or more participants
        governing the exchange of economic or non-economic value.

        Contract is the canonical post-confirmation object in the generalized
        Beckn v2.1 protocol. It replaces the commerce-specific Order construct
        while preserving backward compatibility at the API layer.

        A Contract binds:
          - Commitments (what is agreed)
          - Consideration (value promised)
          - Performance (how execution occurs)
          - Settlements (how consideration is discharged)

        The model is domain-neutral and supports commerce, hiring,
        energy markets, carbon exchanges, data access, mobility,
        subscriptions, and other use cases.

      required:
        - "@context"
        - "@type"
        - beckn:id
        - beckn:status
        - beckn:parties
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the generalized Contract schema.
        "@type":
          type: string
          description: JSON-LD type of the object.
          enum: ["beckn:Contract"]
        beckn:id:
          type: string
          description: >
            Globally unique identifier for this Contract instance.
        beckn:status:
          type: string
          description: >
            Current lifecycle state of the contract reflecting
            overall progression and execution state.
          enum: [DRAFT, PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, FAILED, TERMINATED]
        beckn:parties:
          type: array
          description: >
            Participants bound by this Contract along with their roles.
            A Contract must have at least two parties.
          minItems: 2
          items:
            type: object
            required:
              - beckn:participantId
              - beckn:role
            properties:
              beckn:participantId:
                type: string
                description: Unique identifier of the participant.
              beckn:role:
                type: string
                description: >
                  Role played by this participant within the contract
                  (e.g., BUYER, SELLER, PROVIDER, CONSUMER, EMPLOYER,
                  EMPLOYEE, PRODUCER, GRID_OPERATOR, etc.)
        beckn:commitments:
          type: array
          description: >
            Structured commitments governed by this contract.

            Each commitment references an agreed entity such as:
              - Resource
              - Offer
              - Domain-specific object

            This generalizes legacy concepts such as:
              - orderItems
              - acceptedOffers

            Commitments represent what is being agreed.
          minItems: 1
          items:
            type: object
            required:
              - beckn:ref
              - beckn:refType
            properties:
              beckn:ref:
                type: string
                description: Identifier of the committed entity.
              beckn:refType:
                type: string
                enum: [RESOURCE, OFFER, OTHER]
                description: Type of entity being committed.
              beckn:quantity:
                type: number
                description: Quantity or extent of the commitment, if applicable.
              beckn:commitmentAttributes:
                $ref: '#/components/schemas/Attributes'
        beckn:consideration:
          type: array
          description: >
            Value agreed to be exchanged under this contract.

            Consideration represents what is owed and may include:
              - Monetary value
              - Tokens or credits
              - Asset transfer
              - Service exchange
              - Compliance artifacts
              - Multi-party settlement constructs

            Settlement records represent the discharge of consideration.
          items:
            $ref: '#/components/schemas/Consideration'
        beckn:performance:
          type: array
          description: >
            Execution units of the contract.

            Performance generalizes the legacy Fulfillment abstraction.
            Each Performance instance represents a structured execution
            plan or delivery mechanism, including:

              - Physical delivery
              - Service provisioning
              - API access
              - Subscription activation
              - Carbon credit transfer
              - Capacity allocation
              - Workforce onboarding

            Tracking and Support interactions may be linked to
            individual Performance units.
          items:
            $ref: '#/components/schemas/Performance'
        beckn:settlements:
          type: array
          description: >
            Records representing discharge of agreed consideration.

            Settlement generalizes the concept of Payment and may include:
              - Monetary transfers
              - Token or credit transfers
              - Asset movement
              - Capacity allocation
              - Service offset
              - Other domain-specific settlement mechanisms

            Monetary settlement is a specialization of Settlement.
          items:
            $ref: '#/components/schemas/Settlement'
        beckn:contractAttributes:
          $ref: '#/components/schemas/Attributes'
          description: >
            Domain-specific extension attributes associated with this contract.

    Commitment:
      type: object
      description: |
        A single committed entity in the contract.
        Typically references either:
        - a Resource (what is being committed)
        - an Offer (under which terms)
      required: ["@context", "@type", beckn:ref, beckn:refType]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Commitment"]        
        beckn:ref:
          type: string
          description: Identifier of the committed entity.
        beckn:refType:
          type: string
          enum: [RESOURCE, OFFER, OTHER]
        beckn:quantity:
          type: number
          description: Quantity/extent, if applicable.

    Consideration:
      type: object
      description: >
        Generalized representation of value exchanged under a Contract.

        Consideration is domain-neutral and may represent:
        - Monetary value
        - Credits / tokens
        - Asset transfer
        - Service exchange
        - Compliance artifact
      required: ["@context", "@type", beckn:type, beckn:status]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Consideration"]                
        beckn:type:
          type: string
          enum: [MONETARY, TOKEN, CREDIT, ASSET, SERVICE, OTHER]
        beckn:status:
          type: string
          enum: [PROPOSED, AGREED, PENDING, SETTLED, FAILED, CANCELLED]
        beckn:amount:
          type: object
          description: Optional amount/value structure
          additionalProperties: true
        beckn:considerationAttributes:
          $ref: '#/components/schemas/Attributes'

    Performance:
      type: object
      description: |
        Generalized execution/performance unit. This is where downstream objects bind:
        - Fulfillment-like details (where/when/how)
        - Tracking handles
        - Support touchpoints
        - Status updates

        Domain packs can attach rich fields via `beckn:performanceAttributes`.
      required: ["@context", "@type", beckn:id, beckn:status]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Performance"]                
        beckn:id:
          type: string
        beckn:status:
          type: string
          description: Execution state of this performance unit.
          enum: [PLANNED, IN_PROGRESS, COMPLETED, FAILED, CANCELLED]
        beckn:mode:
          type: string
          enum: [DELIVERY, SERVICE, ACCESS, TRANSFER, EXECUTION, OTHER]
        beckn:commitmentRefs:
          type: array
          description: Commitments fulfilled by this performance.
          items:
            type: string
        beckn:performanceAttributes:
          $ref: '#/components/schemas/Attributes'

    Settlement:
      type: object
      description: >
        Represents the discharge of agreed consideration under a Contract.

        Settlement may occur via:
          - Monetary payment
          - Token or credit transfer
          - Asset movement
          - Capacity allocation
          - Service exchange
          - Other domain-specific mechanisms.
      required:
        - "@context"
        - "@type"
        - beckn:type
        - beckn:status
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Settlement"]                
        beckn:type:
          type: string
          enum: [MONETARY, TOKEN, CREDIT, ASSET, SERVICE, OTHER]
        beckn:status:
          type: string
          enum: [INITIATED, PENDING, COMPLETED, FAILED, CANCELLED]
        beckn:amount:
          type: object
          description: >
            Applicable for monetary or token settlements.
          additionalProperties: true
        beckn:considerationRefs:
          type: array
          description: Consideration obligations discharged by this settlement.
          items:
            type: string          
        beckn:settlementRef:
          type: string
          description: >
            External transaction reference (e.g., payment gateway ID,
            blockchain tx hash, clearing reference).
        beckn:settlementAttributes:
          $ref: '#/components/schemas/Attributes'          

    # ----------------------------
    # Refs to existing core (legacy) schemas
    # ----------------------------
    AckResponse:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/AckResponse'
    ErrorResponse:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/ErrorResponse'
    Descriptor:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Descriptor'
    Provider:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Provider'
    Attributes:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'
    TimePeriod:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/TimePeriod'
    Item:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Item'
    Order:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Order'
    LegacyOffer:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Offer'
    Fulfillment:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Fulfillment'
    Payment:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Payment'
    Tracking:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Tracking'
    TrackAction:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/TrackAction'
    SupportInfo:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/SupportInfo'
    Rating:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Rating'
    RatingInput:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/RatingInput'
    Form:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Form'

    # ----------------------------
    # Discovery helpers (kept minimal; can remain as-is from current beckn.yaml)
    # ----------------------------
    GeoJSONGeometry:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/GeoJSONGeometry'

    SpatialConstraint:
      type: object
      required: [op, targets]
      properties:
        op:
          type: string
          enum: [s_within, s_contains, s_intersects, s_disjoint, s_overlaps, s_crosses, s_touches, s_equals, s_dwithin]
        targets:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        geometry: { $ref: '#/components/schemas/GeoJSONGeometry' }
        distanceMeters: { type: number, minimum: 0 }
        quantifier:
          type: string
          enum: [any, all, none]
          default: any
      additionalProperties: false

    MediaSearch:
      type: object
      properties:
        media:
          type: array
          items: { $ref: '#/components/schemas/MediaInput' }
        options: { $ref: '#/components/schemas/MediaSearchOptions' }
      additionalProperties: false

    MediaInput:
      type: object
      required: [type, url]
      properties:
        id: { type: string }
        type: { type: string, enum: [image, audio, video] }
        url: { type: string, format: uri }
        contentType: { type: string }
        textHint: { type: string }
        language: { type: string }
        startMs: { type: integer }
        endMs: { type: integer }
      additionalProperties: false

    MediaSearchOptions:
      type: object
      properties:
        goals:
          type: array
          items:
            type: string
            enum: [visual-similarity, visual-object-detect, text-from-image, text-from-audio, semantic-audio-match, semantic-video-match]
        augment_text_search: { type: boolean, default: true }
        restrict_results_to_media_proximity: { type: boolean, default: false }
      additionalProperties: false

    # ----------------------------
    # Catalog Publish envelopes (kept as-is)
    # ----------------------------
    CatalogPublishRequest:
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [catalog_publish]
        message:
          type: object
          required: [catalogs]
          properties:
            catalogs:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/Catalog' }

    CatalogPublishResponse:
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [on_catalog_publish]
        message:
          type: object
          properties:
            results:
              type: array
              items: { $ref: '#/components/schemas/CatalogProcessingResult' }

    CatalogProcessingResult:
      type: object
      required: [catalog_id, status]
      properties:
        catalog_id: { type: string }
        status: { type: string, enum: [ACCEPTED, REJECTED, PARTIAL] }
        item_count: { type: integer, minimum: 0 }
        warnings:
          type: array
          items: { $ref: '#/components/schemas/ProcessingNotice' }
        error:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Error'

    ProcessingNotice:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
