openapi: 3.1.1
info:
  title: Beckn Protocol API
  description: |
    The Beckn Protocol API Specification v2.0 — a concrete, developer-friendly OpenAPI 3.1.1
    specification with one named path per Beckn protocol action.

    ## Design Philosophy
    - **Minimalism**: Transport-layer schemas are inline. All data-model schemas
      (Catalog, Contract, Intent, etc.) are resolved from #/components/schemas.
    - **Pragmatism**: Every transaction endpoint carries both `order` (legacy, backward-compatible)
      and `contract` (new, generalized) in its message envelope via `oneOf`.
    - **Backward compatibility**: Implementations conformant with previous versions interoperate
      seamlessly with new implementations using the `contract` model.

    ## Typical Transaction Lifecycle
    ```
    discover → on_discover
    select → on_select → init → on_init → confirm → on_confirm
    → [status / on_status]* → [update / on_update]* → [cancel / on_cancel]?
    → [track / on_track]* → rate / on_rate → support / on_support
    ```

    ## (NEW) `context.try` — Sandbox Mode
    The `try` flag on the `Context` object (defined in `#/components/schemas/Context/v2.0`)
    indicates a sandbox mode being enabled on the network participant:
    - `context.try: true` — Request to test an endpoint without liabilities
      **before** committing. The receiver responds with expected consequences without changing state.
    - `context.try: false` (default) — Commit the action.
    This pattern is applicable to `update`, `cancel`, `rate`, and `support` actions.

    ## Authentication
    All requests MUST carry a valid Beckn HTTP Signature in the `Authorization` header.
    The `Ack` response body MUST carry a `CounterSignature` proving receipt.
    See `docs/10_Signing_Beckn_APIs_in_HTTP.md` for the signing specification.

    ## Compatibility Scope
    This specification is designed for interoperability across ALL value-exchange use cases:
    retail, mobility, logistics, energy, healthcare, skilling, financial services,
    carbon trading, hiring, data licensing, and any other domain built on Beckn.
  version: 2.0.0
  contact:
    name: Beckn Protocol
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en

tags:
  - name: Discovery
    description: Discover catalogs across a Beckn network
  - name: Transaction
    description: Select, negotiate, confirm and manage contracts/orders
  - name: Fulfillment
    description: Track, update and cancel active contracts/orders
  - name: Post-Fulfillment
    description: Rate and support completed contracts/orders
  - name: Catalog Publishing
    description: Publish catalogs to a Catalog Discovery Service (CDS)

paths:

  # ─────────────────────────────────────────────────────────────────────
  # DISCOVERY
  # ─────────────────────────────────────────────────────────────────────

  /beckn/discover:
    post:
      summary: Discover catalogs on a network
      description: |
        Search and discover catalogs on an open network. Supports text search (textSearch),
        JSONPath-based filtering (RFC 9535), spatial (geo) constraints, and media search.
        Returns an **ACK** confirming receipt; actual catalogs arrive via `/beckn/on_discover`.
        Can be implemented by Catalog Discovery Services (CDS) and BPPs.
      operationId: discover
      tags: [Discovery]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0' # TODO: fetch this from schema.beckn.io/Context/v2.0
                    - type: object
                      properties:
                        action:
                          type: string
                          const: discover
                message:
                  $ref: '#/components/schemas/DiscoverAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_discover:
    post:
      summary: Callback — return catalogs to the BAP
      description: |
        Callback from a BPP or CDS containing catalogs matching the discovery request.
        Returns an **ACK** confirming receipt of the catalog payload.
      operationId: onDiscover
      tags: [Discovery]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_discover
                message:
                  $ref: '#/components/schemas/OnDiscoverMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # TRANSACTION — ORDERING
  # ─────────────────────────────────────────────────────────────────────

  /beckn/select:
    post:
      summary: BAP selects items/resources and requests a quote
      description: |
        The BAP selects catalog items, item quantities, associated offers, and requests
        the BPP to provide a priced quote. No PII is shared at this stage.
        Supports both the legacy `order` model (2.0-rc1) and the new `contract` model.
      operationId: select
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: select
                message:
                  $ref: '#/components/schemas/SelectAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_select:
    post:
      summary: BPP returns a priced quote
      description: |
        The BPP calculates the total cost, evaluates offers, and returns a priced quote.
        Supports both the legacy `order` model and the new `contract` model.
      operationId: onSelect
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_select
                message:
                  $ref: '#/components/schemas/OnSelectAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/init:
    post:
      summary: BAP initiates final order — submits billing, fulfillment and payment intent
      description: |
        BAP provides billing, fulfillment, and payment information for the BPP to generate
        final order terms. The BPP responds via `on_init` with the final draft including
        payment terms. Supports both `order` (legacy) and `contract` (new) models.
      operationId: init
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: init
                message:
                  $ref: '#/components/schemas/InitAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_init:
    post:
      summary: BPP returns final draft order/contract with payment terms
      description: |
        BPP returns the final draft order or contract with personalized payment terms.
        The BPP MUST NOT request payment before this stage.
      operationId: onInit
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_init
                message:
                  $ref: '#/components/schemas/OnInitAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/confirm:
    post:
      summary: BAP confirms the order/contract
      description: |
        BAP accepts all terms and provides payment proof/reference, then requests the BPP
        to confirm the order or contract into a binding commitment.
      operationId: confirm
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: confirm
                message:
                  $ref: '#/components/schemas/ConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_confirm:
    post:
      summary: BPP returns the confirmed order/contract
      description: |
        BPP validates all terms, payment, and returns a confirmed order or contract with
        its assigned ID and the initial fulfillment/performance state.
      operationId: onConfirm
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_confirm
                message:
                  $ref: '#/components/schemas/OnConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # FULFILLMENT
  # ─────────────────────────────────────────────────────────────────────

  /beckn/status:
    post:
      summary: BAP requests the current state of an order/contract
      description: |
        BAP requests the latest state of an active order or contract by providing its ID.
        The BPP responds via `on_status`. BAPs SHOULD NOT long-poll with `status` —
        use `on_status` push notifications for significant state changes.
      operationId: status
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: status
                message:
                  $ref: '#/components/schemas/StatusAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_status:
    post:
      summary: BPP returns the current state of the order/contract
      description: |
        BPP returns the latest state of the order or contract including fulfillment/performance
        updates. The BPP MAY call this endpoint proactively without the BAP requesting it,
        but MUST have received at least one `status` request first to initiate the push stream.
        This endpoint is for significant state changes worth a notification — NOT for
        real-time location tracking (use `track`/`on_track` for that).
      operationId: onStatus
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_status
                message:
                  $ref: '#/components/schemas/OnStatusAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/track:
    post:
      summary: BAP requests a real-time tracking handle for an active order/contract
      description: |
        BAP requests a tracking handle (URL, WebSocket endpoint, or webhook) for real-time
        tracking of an active fulfillment or performance stage. This is for real-time
        position/progress updates — NOT for order state change notifications (use `status`).
      operationId: track
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: track
                message:
                  $ref: '#/components/schemas/TrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_track:
    post:
      summary: BPP returns real-time tracking handle and status
      operationId: onTrack
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_track
                message:
                  $ref: '#/components/schemas/OnTrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/update:
    post:
      summary: BAP requests a mutation to an active order/contract
      description: |
        BAP requests the BPP to update an active order or contract. Updates may involve
        change of items, quantities, billing, fulfillment/performance, or payment.

        Uses the `context.try` two-phase pattern (defined in `Context` schema):
        - `context.try: true` — BAP requests updated terms before committing (preview mode).
          BPP responds with recalculated quote and terms via `on_update` without changing state.
        - `context.try: false` (default) — BAP commits the update.
          BPP responds with the confirmed updated order/contract.
      operationId: update
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/UpdateInitAction'
                    - $ref: '#/components/schemas/UpdateConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_update:
    post:
      summary: BPP returns the updated order/contract
      description: |
        BPP returns the updated order or contract with recalculated terms. Can be called
        proactively by the BPP without the BAP requesting it.
        - If `context.try: true` — returns updated terms (preview; state not changed).
        - If `context.try: false` — returns committed updated order/contract.
      operationId: onUpdate
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/OnUpdateInitAction'
                    - $ref: '#/components/schemas/OnUpdateConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/cancel:
    post:
      summary: BAP requests cancellation of an order/contract
      description: |
        BAP requests full or partial cancellation. Uses the `context.try` two-phase pattern:
        - `context.try: true` — BAP requests cancellation terms (e.g., refund policy, penalty)
          without committing to cancellation. BPP responds with applicable policy via `on_cancel`.
        - `context.try: false` (default) — BAP commits the cancellation.
          BPP confirms cancellation and returns cancelled order/contract.
      operationId: cancel
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/CancelInitAction'
                    - $ref: '#/components/schemas/CancelConfirmction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_cancel:
    post:
      summary: BPP returns cancellation terms or confirms cancellation
      description: |
        - If `context.try: true` — returns applicable cancellation policy, fees, refund timeline
          (state not changed).
        - If `context.try: false` — returns confirmed cancelled order/contract with refund/payment update.
      operationId: onCancel
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/OnCancelInitAction'
                    - $ref: '#/components/schemas/OnCancelConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # POST-FULFILLMENT
  # ─────────────────────────────────────────────────────────────────────

  /beckn/rate:
    post:
      summary: BAP submits ratings for one or more entities
      description: |
        BAP submits ratings for any ratable entity (order, contract, fulfillment,
        item, provider, agent, support interaction). Supports the `context.try` pattern:
        - `context.try: true` — Preview: BPP returns the rating form/criteria without recording.
        - `context.try: false` (default) — Submit: BPP records the rating and returns confirmation.
        The BPP acknowledges via `on_rate` with an optional aggregate snapshot.
      operationId: rate
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/RateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_rate:
    post:
      summary: BPP acknowledges rating and optionally returns aggregate
      description: |
        - If `context.try: true` — returns rating form/criteria (preview mode).
        - If `context.try: false` — confirms rating was recorded; optionally returns aggregate.
      operationId: onRate
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/OnRateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/support:
    post:
      summary: BAP requests support information for an entity
      description: |
        BAP requests support channels and/or raises a support ticket for any entity.
        Uses the `context.try` pattern:
        - `context.try: true` — Preview: BPP returns available support channels without creating a ticket.
        - `context.try: false` (default) — BAP submits a support request; BPP creates/links a ticket.
        The `refType` field abstracts over domain-specific entity types (works for contracts,
        resources, providers, agents — not just orders).
      operationId: support
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/SupportAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_support:
    post:
      summary: BPP returns support details
      description: |
        - If `context.try: true` — returns available support channels (preview mode).
        - If `context.try: false` — returns support details with ticket(s).
      operationId: onSupport
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/OnSupportAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # CATALOG PUBLISHING SERVICE
  # ─────────────────────────────────────────────────────────────────────

  /beckn/catalog/publish:
    post:
      summary: BPP publishes catalogs for indexing by a CDS
      description: |
        BPP submits one or more catalogs to be indexed by a Catalog Discovery Service (CDS).
        Returns an **ACK** immediately if accepted for processing. The per-catalog processing
        result arrives asynchronously via `/beckn/catalog/on_publish`.
      operationId: catalogPublish
      tags: [Catalog Publishing]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: catalog/publish
                message:
                  $ref: '#/components/schemas/CatalogPublishAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/catalog/on_publish:
    post:
      summary: CDS returns per-catalog processing results to the BPP
      operationId: catalogOnPublish
      tags: [Catalog Publishing]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: catalog/on_publish
                message:
                  $ref: '#/components/schemas/CatalogOnPublishAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

# ─────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────
components:

  # ─── Parameters ──────────────────────────────────────────────────
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      description: |
        Beckn HTTP Signature authentication header.
        See `#/components/schemas/Signature` for the expected format.
      schema:
        $ref: '#/components/schemas/Signature'

  # ─── Message Schemas ──────────────────────────────────────────────

  schemas:
    AcceptedPaymentMethodMain:
      description: |
        Payment methods accepted for an offer.
        Source: main/schema/core/v2/attributes.yaml#AcceptedPaymentMethod
      type: array
      items:
        type: string
        enum: ["UPI", "CREDIT_CARD", "DEBIT_CARD", "WALLET", "BANK_TRANSFER", "CASH", "APPLE_PAY"]
      x-jsonld:
        "@id": beckn:acceptedPaymentMethod

    Ack:
      $id: '#/components/schemas/Ack/v2.0'
      title: Acknowledgement
      description: Synchronous receipt acknowledgement returned for every accepted Beckn request.
      type: object
      required: [status, signature]
      properties:
        status:
          type: string
          enum: [ACK, NACK]
          description: ACK if the request was accepted; NACK if rejected.
        error:
          $ref: '#/components/schemas/Error'
          description: Present only when status is NACK.
        signature:
          allOf:
            - $ref: '#/components/schemas/CounterSignature'
          description: |
            Counter-signature proving the receiver authenticated and processed the inbound request.

    AckNeedConfirm: # Todo: ask me about this later
      $id: https://schema.beckn.io/AckNeedConfirm/v2.0
      title: Acknowledgement — Needs Confirmation
      description: |
        Used in two-stage negotiation (context.try: true) where the BPP responds to a
        cancel or update request with the consequences/terms of the requested action.
        The BAP must then submit a second request (context.try: false) to commit.

        This response carries a 200 HTTP status but signals that no state change occurred —
        only the consequences/terms are returned for the BAP's consideration.

        The `consequences` object contains domain-specific details about what will happen
        if the BAP proceeds to commit (e.g. refund amount, penalty, updated pricing).
      allOf:
        - $ref: '#/components/schemas/Ack'
        - type: object
          properties:
            consequences:
              type: object
              description: |
                Domain-specific consequences of committing the requested action.
                May include cancellation policy, refund terms, updated quote, penalties, etc.
              additionalProperties: true

    AckNoCallback:
      $id: #/components/schemas/AckNoCallback/v2.0
      title: Acknowledgement — No Callback
      description: |
        Request received and valid, but no asynchronous callback will follow.
        Typical causes: no matching agents found, inventory unavailable, store/provider closed.
      allOf:
        - $ref: '#/components/schemas/Ack'
        - properties:
            error:
              allOf:
                - $ref: '#/components/schemas/Error'
              description: Optional error detail explaining why no callback will follow.

    AckResponseMain:
      description: |
        Acknowledgement response.
        Source: main/schema/core/v2/attributes.yaml#AckResponse
      type: object
      additionalProperties: false
      properties:
        transaction_id:
          type: string
        timestamp:
          type: string
          format: date-time
        ack_status:
          type: string
          enum: [ACK, NACK]
        error:
          $ref: '#/components/schemas/ErrorMain'
      required: [transaction_id, timestamp, ack_status]
      allOf:
        - if:
            properties:
              ack_status:
                const: NACK
            required: [ack_status]
          then:
            required: [error]
        - if:
            properties:
              ack_status:
                const: ACK
            required: [ack_status]
          then:
            not:
              required: [error]

    AddressMain:
      description: |
        Postal address aligned with schema.org PostalAddress.
        Source: main/schema/core/v2/attributes.yaml#Address
      type: object
      properties:
        streetAddress:
          type: string
          description: Street address (building name/number and street).
        extendedAddress:
          type: string
          description: Address extension (apt/suite/floor, C/O).
        addressLocality:
          type: string
          description: City/locality.
        addressRegion:
          type: string
          description: State/region/province.
        postalCode:
          type: string
          description: Postal/ZIP code.
        addressCountry:
          type: string
          description: Country name or ISO-3166-1 alpha-2 code.
      additionalProperties: false

    AsyncError:
      title: Asynchronous Error
      description: |
        Error returned asynchronously during a callback. Wraps the base `Error` schema with
        JSON-LD type annotations to allow linked-data processing.
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            '@context':
              type: string
              default: '#/components/schemas/'
            '@type':
              type: string
              default: AsyncError
          additionalProperties: true

    AttributesMain:
      description: |
        JSON-LD aware bag for domain-specific attributes.
        Source: main/schema/core/v2/attributes.yaml#Attributes
      type: object
      required: ["@context", "@type"]
      minProperties: 2
      additionalProperties: true
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the specific domain schema
        "@type":
          type: string
          description: JSON-LD type within the domain schema

    BuyerMain:
      description: |
        A minimal entity representing a buyer (Person or Organization).
        Source: main/schema/core/v2/attributes.yaml#Buyer
      type: object
      additionalProperties: false
      required: ["@context", "@type", "beckn:id"]
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Buyer"]
        beckn:id:
          type: string
          description: Unique identifier for the buyer
        beckn:role:
          type: string
          enum: ["BUYER","SELLER","INTERMEDIARY","PAYER","PAYEE","FULFILLER"]
        beckn:displayName:
          type: string
        beckn:telephone:
          type: string
        beckn:email:
          type: string
          format: email
        beckn:taxID:
          type: string
        beckn:buyerAttributes:
          $ref: '#/components/schemas/AttributesMain'

    CancelAction:
      $id: https://schema.beckn.io/CancelAction/v2.0
      title: Cancel Action
      description: |
        Beckn /beckn/cancel message payload. Sent by a BAP to a BPP to request
        cancellation of an active contract. Set context.try to true to first
        retrieve cancellation terms and fees before committing.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    CancelConfirmMessageRavi:
      description: |
        Cancel confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#CancelConfirmMessage
      type: object
      required:
        - cancelAction
      properties:
        cancelAction:
          type: object
          required: [order, reason]
          properties:
            order:
              allOf:
                - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'
                - required: [id, docs]
            reason:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/CancellationReason'

    CancelInitMessageRavi:
      description: |
        Cancel init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#CancelInitMessage
      type: object
      required:
        - order
      properties:
        cancelAction:
          type: object
          properties:
            order:
              type: object
              additionalProperties: false
              required:
                - beckn:id
              properties:
                beckn:id:
                  $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order/properties/beckn:id'
            reason:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/CancellationDetails'

    CancelMessage:
      $id: #/components/schemas/CancelMessage/v2.0
      description: |
        Cancellation request payload. Provide the `order.id` or `contract.id` and
        optionally a `cancellationReason`. When `context.try: true`, only the ID is
        required (reason optional). When `context.try: false`, supporting documentation
        (if required by the BPP's cancellation policy) SHOULD be included.
      type: object
      properties:
        order:
          type: object
          required: [id]
          properties:
            id:
              type: string
              description: ID of the order to cancel
            cancellationReason:
              $ref: '#/components/schemas/CancellationReason/v2.0'
        contract:
          type: object
          required: [id]
          properties:
            id:
              type: string
              description: ID of the contract to cancel
            cancellationReason:
              $ref: '#/components/schemas/CancellationReason/v2.0'
      oneOf:
        - required: [order]
        - required: [contract]

    # ── Rate Messages ───────────────────────────────────────────────

    Catalog:
      $id: https://schema.beckn.io/Catalog/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: Catalog schema for Beckn Protocol v2.0.1
      title: Catalog
      x-tags: [common]
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core Catalog schema
          type: string
          format: uri
          const: "https://schema.beckn.io/"
        '@type':
          description: Type of the catalog
          type: string
          const: beckn:Catalog
        publisher:
          description: >
            The entity publishing this catalog.
            Either a publisher (Organization or Person) OR both bppId and bppUri
            must be provided.
          oneOf:
            - $ref: 'https://schema.beckn.io/Organization/v2.0'
            - $ref: 'https://schema.beckn.io/Person/v2.0'
        bppId:
          description: BPP (Beckn Protocol Provider) identifier that publishes this catalog
          type: string
          example: bpp.example.com
        bppUri:
          description: BPP (Beckn Protocol Provider) URI endpoint
          type: string
          format: uri
          example: "https://bpp.example.com"
        descriptor:
          description: A verbal summary of the catalog for humans, AI agents, etc to read and understand the context.
          allOf:
          - $ref: "https://schema.beckn.io/Descriptor/v2.0"
        id:
          description: Unique identifier for the catalog
          type: string
          example: catalog-electronics-001
        isActive:
          description: Whether the catalog is active
          type: boolean
          default: true
        items:
          description: Array of legacy beckn core Item entities in this catalog (backward compatible)
          type: array
          items:
            $ref: 'https://schema.beckn.io/Item/v2.0'
        resources:
          description: Array of generalized Resource entities in this catalog (new model)
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        visibleTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this catalog.

            If omitted, the catalog is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.
        offers:
          type: array
          items:
            $ref: "https://schema.beckn.io/Offer/v2.0"
        providerId:
          description: |
            Identifier or full object of the provider that owns this catalog.
            - String: reference by ID (lightweight, for CDS indexing)
            - Provider object: full provider details (for direct BPP responses)
          oneOf:
            - type: string
              description: Provider ID string reference
              example: tech-store-001
            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Provider'
              description: Full provider object
        validity:
          description: The time period during which this catalog is valid
          allOf:
          - $ref: "https://schema.beckn.io/TimePeriod/v2.0"
      anyOf:
        - required: [publisher]
        - required: [bppId, bppUri]
      oneOf:
        - required: [items]
        - required: [resources]
      required:
      - '@context'
      - '@type'
      - id
      - descriptor
      additionalProperties: false

    CatalogAbhishek:
      $id: https://schema.beckn.io/AbhishekCatalog/v2.0
      type: object
      description: |
        Discovery container returned in /on_discover.
        Backward compatible:
        - legacy: `beckn:items[]` and legacy `beckn:offers[]`
        - new: `beckn:resources[]` and new `beckn:offers[]` (generalized)
      required: ["@context", "@type", "beckn:id", "beckn:descriptor", "beckn:bppId", "beckn:bppUri"]
      anyOf:
        - required: ["beckn:resources"]
        - required: ["beckn:items"]
        - required: ["beckn:offers"]
      additionalProperties: false
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Catalog"]
        beckn:id:
          type: string
        beckn:descriptor:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Descriptor'
        beckn:bppId:
          type: string
        beckn:bppUri:
          type: string
          format: uri
        beckn:validity:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/TimePeriod'
        beckn:isActive:
          type: boolean
          default: true
          description: Whether the catalog is active.
        beckn:resources:
          type: array
          items: { $ref: '#/components/schemas/Resource' }
        beckn:items:
          type: array
          description: Legacy items (backward compatibility)
          items: { $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Item' }
        beckn:offers:
          type: array
          description: Mixed array of legacy Offer and new generalized Offer.
          items:
            oneOf:
              - $ref: '#/components/schemas/OfferAbhishek'
              - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Offer'
        beckn:availableTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this entity.

            If omitted, the entity is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.

    CatalogMain:
      description: |
        Core Catalog schema from main branch.
        Source: main/schema/core/v2/attributes.yaml#Catalog
      type: object
      required: ["@context", "@type", "beckn:id", "beckn:descriptor", "beckn:bppId", "beckn:bppUri", "beckn:items"]
      additionalProperties: false
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          example: "beckn:Catalog"
        "beckn:id":
          type: string
          description: Unique identifier for the catalog
        "beckn:descriptor":
          $ref: '#/components/schemas/DescriptorMain'
        "beckn:providerId":
          type: string
          description: Reference to the provider that owns this catalog
        "beckn:bppId":
          type: string
          description: BPP identifier
        "beckn:bppUri":
          type: string
          format: uri
          description: BPP URI endpoint
        "beckn:validity":
          $ref: '#/components/schemas/TimePeriodMain'
        "beckn:isActive":
          type: boolean
          default: true
        beckn:items:
          type: array
          items:
            $ref: '#/components/schemas/ItemMain'
        beckn:offers:
          type: array
          items:
            $ref: '#/components/schemas/OfferMain'

    CatalogOnPublishMessage:
      $id: #/components/schemas/CatalogOnPublishMessage/v2.0
      description: Catalog publish processing results from CDS to BPP.
      type: object
      required: [results]
      properties:
        results:
          type: array
          description: Per-catalog processing results
          items:
            $ref: '#/components/schemas/CatalogProcessingResult'

    CatalogProcessingResult:
      $id: #/components/schemas/CatalogProcessingResult/v2.0
      description: Processing result for a single catalog submission.
      type: object
      required: [catalogId, status]
      properties:
        catalogId:
          type: string
          description: Identifier of the submitted catalog
        status:
          description: |
            Processing outcome. Using oneOf [string, object] to allow domain-specific
            status objects (e.g. beckn:CatalogAccepted) alongside standard string codes.
          oneOf:
            - type: string
              enum: [ACCEPTED, REJECTED, PARTIAL]
              description: |
                Standard processing status:
                - ACCEPTED — catalog indexed successfully
                - REJECTED — catalog rejected entirely (see errors)
                - PARTIAL — some items accepted, some rejected (see errors)
            - type: object
              properties:
                '@context':
                  type: string
                  format: uri
                  const: '#/components/schemas/'
                '@type':
                  type: string
                  pattern: '^beckn:[A-Za-z0-9._~-]+$'
              additionalProperties: true
        errors:
          type: array
          description: Per-item or per-catalog errors (present when REJECTED or PARTIAL)
          items:
            $ref: '#/components/schemas/Error'
        stats:
          type: object
          description: Optional statistics about the processed catalog
          properties:
            itemCount:
              type: integer
              description: Number of items accepted
            providerCount:
              type: integer
              description: Number of providers in the catalog
            categoryCount:
              type: integer
              description: Number of distinct categories

    # ── Transport Layer Schemas ─────────────────────────────────────
    # These are protocol-transport concerns — NOT in schemas/schema.

    CatalogProcessingResultAbhishek:
      $id: https://schema.beckn.io/AbhishekCatalogProcessingResult/v2.0
      type: object
      required: [catalog_id, status]
      properties:
        catalog_id: { type: string }
        status: { type: string, enum: [ACCEPTED, REJECTED, PARTIAL] }
        item_count: { type: integer, minimum: 0 }
        warnings:
          type: array
          items: { $ref: '#/components/schemas/ProcessingNoticeAbhishek' }
        error:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Error'

    CatalogProcessingResultRavi:
      description: |
        Processing result for a single catalog from Ravi's version.
        Source: beckn-ravis-original-version.yaml#CatalogProcessingResult
      type: object
      required:
        - catalogId
        - status
      properties:
        catalogId:
          type: string
          description: Identifier of the catalog being processed
        status:
          type: string
          enum: [accepted, rejected, processing]
          description: Processing status of the catalog
        errors:
          type: array
          description: List of errors encountered during processing
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              path:
                type: string
        stats:
          type: object
          description: Derived statistics about the catalog
          properties:
            itemCount:
              type: integer
            providerCount:
              type: integer
            categoryCount:
              type: integer

    CatalogPublishMessage:
      $id: #/components/schemas/CatalogPublishMessage/v2.0
      description: Catalog publish request payload.
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          minItems: 1
          description: One or more catalogs to be indexed by the CDS
          items:
            $ref: '#/components/schemas/Catalog/v2.0'

    CatalogPublishMessageRavi:
      description: |
        Catalog publish request from Ravi's version.
        Source: beckn-ravis-original-version.yaml#CatalogPublishMessage
      type: object
      required:
        - catalogs
      properties:
        catalogs:
          type: array
          description: Array of catalogs containing items
          items:
            $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Catalog'
          minItems: 1

    CatalogPublishRequestAbhishek:
      $id: https://schema.beckn.io/AbhishekCatalogPublishRequest/v2.0
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContextAbhishek'
            - type: object
              properties:
                action:
                  type: string
                  enum: [catalog_publish]
        message:
          type: object
          required: [catalogs]
          properties:
            catalogs:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/CatalogAbhishek' }

    CatalogPublishResponseAbhishek:
      $id: https://schema.beckn.io/AbhishekCatalogPublishResponse/v2.0
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContextAbhishek'
            - type: object
              properties:
                action:
                  type: string
                  enum: [on_catalog_publish]
        message:
          type: object
          properties:
            results:
              type: array
              items: { $ref: '#/components/schemas/CatalogProcessingResultAbhishek' }

    CategoryCodeMain:
      description: |
        Category code.
        Source: main/schema/core/v2/attributes.yaml#CategoryCode
      type: object
      required: ["@type", "schema:codeValue"]
      properties:
        "@type":
          type: string
          enum: ["schema:CategoryCode"]
        "schema:codeValue":
          type: string
        "schema:name":
          type: string
        "schema:description":
          type: string

    CommitmentAbhishek:
      $id: https://schema.beckn.io/AbhishekCommitment/v2.0
      type: object
      description: |
        A single committed entity in the contract.
        Typically references either:
        - a Resource (what is being committed)
        - an Offer (under which terms)
      required: ["@context", "@type", beckn:ref, beckn:refType]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Commitment"]
        beckn:ref:
          type: string
          description: Identifier of the committed entity.
        beckn:refType:
          type: string
          enum: [RESOURCE, OFFER, OTHER]
        beckn:quantity:
          type: number
          description: Quantity/extent, if applicable.

    ConfirmAction:
      $id: https://schema.beckn.io/ConfirmAction/v2.0
      title: Confirm Action
      description: |
        Beckn /beckn/confirm message payload. Sent by a BAP to a BPP to confirm
        a contract, finalising the transaction terms agreed during the
        select–init negotiation cycle.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    ConfirmMessageRavi:
      description: |
        Confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#ConfirmMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    ConsiderationAbhishek:
      $id: https://schema.beckn.io/AbhishekConsideration/v2.0
      type: object
      description: >
        Generalized representation of value exchanged under a Contract.

        Consideration is domain-neutral and may represent:
        - Monetary value
        - Credits / tokens
        - Asset transfer
        - Service exchange
        - Compliance artifact
      required: ["@context", "@type", beckn:type, beckn:status]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Consideration"]
        beckn:type:
          type: string
          enum: [MONETARY, TOKEN, CREDIT, ASSET, SERVICE, OTHER]
        beckn:status:
          type: string
          enum: [PROPOSED, AGREED, PENDING, SETTLED, FAILED, CANCELLED]
        beckn:amount:
          type: object
          description: Optional amount/value structure
          additionalProperties: true
        beckn:considerationAttributes:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'

    Contract:
      $id: https://schema.beckn.io/Contract/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: This is a JSON-LD compliant, linked-data schema that specifies a generic multi-party, digitally signed Contract between a set of participants. based on the vocabulary defined in the @context. By default, it is the most generic form of contract i.e beckn:Contract. However, based on the mapping being used in @context, it could take values like retail:Order, mobility:Reservation, healthcare:Appointment, and so on, which will be defined as sub-classes of beckn:Contract.
      title: Contract
      type: object
      properties:
        '@context':
          description: A URL to the reference vocabulary where this schema has been defined. If missing, this
            field defaults to `https://schema.beckn.io/`. It allows applications to fetch the mapping between
            the simple JSON keys of this class and absolute Beckn IRIs (Internationalized Resource Identifiers),
            allowing conversion of standard Beckn JSON payload into linked data.
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          description: A Beckn IRI on the vocabulary defined in the @context. Must start with "beckn:" followed
            by URL-safe identifier characters.
          type: string
          pattern: ^beckn:[A-Za-z0-9._~-]+$
          default: beckn:Contract
        id:
          description: A UUID string generated at the BPP endpoint at any stage before the confirmation of the
            order i.e before `/on_confirm` callback. This value is intended typically for indexing or filtering.
            While the chances of a UUID collision are rare, it is recommended to use a combination of `bppId`,
            `providerId` and `id` to allow for global uniqueness.
          type: string
          format: uuid
        displayId:
          description: A human-readable / Agent-readable identifier of the contract intended for display or
            printing. This value may or may not be different from `id` which is intended purely for machine-readability.
            Typically, this value is generated after the confirmation of the order at the BPP's end.
          type: string
        items:
          description: The items of value i.e resources, specified in this contract. Depending upon the context,
            these resources could be a combination physical objects, virtual objects, services, time slots,
            distance travelled, alloted space, and many more.
          type: array
          items:
            $ref: https://schema.beckn.io/ContractItem/v2.0
          minItems: 1
        status:
          description: The current state of the contract. Depending on the context, it could be just a code
            or a detailed description of state.
          oneOf:
          - type: string
            description: A single code describing the status of the contract.
            enum: [DRAFT, ACTIVE, CANCELLED, COMPLETE, PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, FAILED, TERMINATED]
          - type: object
            properties:
              '@context':
                type: string
                format: uri
                const: https://schema.beckn.io/
              '@type':
                type: string
                pattern: ^beckn:[A-Za-z0-9._~-]+$
            additionalProperties: true
        contractValue:
          description: An object that captures the total value of the contract including a breakup of the items,
            discounts, fulfillment charges, and any other additional charges relevant to that context.
          oneOf:
          - $ref: https://schema.beckn.io/PriceSpecification/v2.0
          - type: object
            properties:
              '@context':
                type: string
                format: uri
                const: https://schema.beckn.io/
              '@type':
                type: string
                pattern: ^beckn:[A-Za-z0-9._~-]+$
            additionalProperties: true
        participants:
          description: The participants involved in the contract. Contracts are not always between two individuals.
            Several entities may play a specific role in the creation, fulfillment, and post-fulfillment of
            the contract.
          type: array
          items:
            $ref: https://schema.beckn.io/Participant/v2.0
        entitlements:
          type: array
          items:
            $ref: https://schema.beckn.io/Entitlement/v2.0
        fulfillments:
          description: Describes the acts performed by each participant to fulfill the contract
          type: array
          items:
            $ref: https://schema.beckn.io/Fulfillment/v2.0
      required:
      - '@type'
      - participants
      - items
      additionalProperties: false
      x-tags:
      - common

    ContractAbhishek:
      $id: https://schema.beckn.io/AbhishekContract/v2.0
      type: object
      description: >
        A digitally agreed commitment between two or more participants
        governing the exchange of economic or non-economic value.

        Contract is the canonical post-confirmation object in the generalized
        Beckn v2.1 protocol. It replaces the commerce-specific Order construct
        while preserving backward compatibility at the API layer.

        A Contract binds:
          - Commitments (what is agreed)
          - Consideration (value promised)
          - Performance (how execution occurs)
          - Settlements (how consideration is discharged)

        The model is domain-neutral and supports commerce, hiring,
        energy markets, carbon exchanges, data access, mobility,
        subscriptions, and other use cases.
      required:
        - "@context"
        - "@type"
        - beckn:id
        - beckn:status
        - beckn:parties
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the generalized Contract schema.
        "@type":
          type: string
          description: JSON-LD type of the object.
          enum: ["beckn:Contract"]
        beckn:id:
          type: string
          description: >
            Globally unique identifier for this Contract instance.
        beckn:status:
          type: string
          description: >
            Current lifecycle state of the contract reflecting
            overall progression and execution state.
          enum: [DRAFT, PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, FAILED, TERMINATED]
        beckn:parties:
          type: array
          description: >
            Participants bound by this Contract along with their roles.
            A Contract must have at least two parties.
          minItems: 2
          items:
            type: object
            required:
              - beckn:participantId
              - beckn:role
            properties:
              beckn:participantId:
                type: string
                description: Unique identifier of the participant.
              beckn:role:
                type: string
                description: >
                  Role played by this participant within the contract
                  (e.g., BUYER, SELLER, PROVIDER, CONSUMER, EMPLOYER,
                  EMPLOYEE, PRODUCER, GRID_OPERATOR, etc.)
        beckn:commitments:
          type: array
          description: >
            Structured commitments governed by this contract.
          minItems: 1
          items:
            type: object
            required:
              - beckn:ref
              - beckn:refType
            properties:
              beckn:ref:
                type: string
                description: Identifier of the committed entity.
              beckn:refType:
                type: string
                enum: [RESOURCE, OFFER, OTHER]
                description: Type of entity being committed.
              beckn:quantity:
                type: number
                description: Quantity or extent of the commitment, if applicable.
              beckn:commitmentAttributes:
                $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'
        beckn:consideration:
          type: array
          description: >
            Value agreed to be exchanged under this contract.
          items:
            $ref: '#/components/schemas/ConsiderationAbhishek'
        beckn:performance:
          type: array
          description: >
            Execution units of the contract.
          items:
            oneOf:
              - $ref: '#/components/schemas/Performance'
              - $ref: 'https://schema.beckn.io/Fulfillment/v2.0'
        beckn:settlements:
          type: array
          description: >
            Records representing discharge of agreed consideration.
          items:
            $ref: '#/components/schemas/SettlementAbhishek'
        beckn:contractAttributes:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'
          description: >
            Domain-specific extension attributes associated with this contract.

    CounterSignature:
      title: Beckn HTTP Counter-Signature
      description: |
        A signed receipt transmitted in the synchronous `Ack` response body, proving that the
        receiver authenticated, received, and processed the inbound request.

        `CounterSignature` shares the same wire format as `Signature` but differs:
        - **Signer**: the response receiver (not the request sender)
        - **Location**: transmitted in the `Ack` response body (not in the `Authorization` header)
        - **`digest`**: covers the Ack response body (not the inbound request body)
        - **`(request-digest)`** and **`(message-id)`** MUST be included in the signing string

        Signing string format:
        ```
        (created): {unixTimestamp}
        (expires): {unixTimestamp}
        digest: BLAKE-512={base64DigestOfAckBody}
        (request-digest): BLAKE-512={base64DigestOfInboundRequestBody}
        (message-id): {messageId}
        ```
      allOf:
        - $ref: '#/components/schemas/Signature'

    DescriptorMain:
      description: |
        Human-readable descriptor.
        Source: main/schema/core/v2/attributes.yaml#Descriptor
      type: object
      required: ["@type"]
      properties:
        "@type":
          type: string
          enum: ["beckn:Descriptor"]
        "schema:name":
          type: string
        "beckn:shortDesc":
          type: string
        "beckn:longDesc":
          type: string
        "schema:image":
          type: array
          items:
            type: string
            format: uri

    DiscoverAction:
      description: |
        The discover request payload. Contains an `Intent` object for structured 
        or unstructured discovery.
      type: object
      properties:
        intent:
          description: Structured intent object for discovery
      required:
        - intent

    DiscoverActionExternal:
      $id: https://schema.beckn.io/DiscoverAction/v2.0
      title: Discover Action (External)
      description: |
        Beckn /beckn/discover message payload as published at schema.beckn.io.
        Contains the Intent object for structured or unstructured discovery.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        intent:
          allOf:
            - $ref: '#/components/schemas/Intent'
      required:
        - intent

    DiscoverMessageRavi:
      description: |
        Discover message (DiscoveryIntent) from Ravi's version.
        Source: beckn-ravis-original-version.yaml#DiscoverMessage
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/DiscoveryIntent'

    DiscoverRequestAbhishek:
      $id: https://schema.beckn.io/AbhishekDiscoverRequest/v2.0
      type: object
      required: [context]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContextAbhishek'
            - type: object
              properties:
                action:
                  type: string
                  enum: [discover]
        message:
          type: object
          description: Discover payload containing search criteria
          properties:
            text_search: { type: string }
            filters:
              type: object
              properties:
                type: { type: string, enum: [jsonpath], default: jsonpath }
                expression: { type: string }
              required: [type, expression]
            spatial:
              type: array
              items: { $ref: '#/components/schemas/SpatialConstraintAbhishek' }
            media_search:
              $ref: '#/components/schemas/MediaSearchAbhishek'
          anyOf:
            - required: [text_search]
            - required: [filters]
            - required: [spatial]
            - required: [filters, spatial]

    DiscoverResponseAbhishek:
      $id: https://schema.beckn.io/AbhishekDiscoverResponse/v2.0
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContextAbhishek'
            - type: object
              properties:
                action:
                  type: string
                  enum: [on_discover]
        message:
          type: object
          properties:
            catalogs:
              type: array
              items: { $ref: '#/components/schemas/CatalogAbhishek' }

    DiscoveryContextAbhishek:
      $id: https://schema.beckn.io/AbhishekDiscoveryContext/v2.0
      allOf:
        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications/refs/heads/master/api/transaction/build/transaction.yaml#/components/schemas/Context'
        - type: object
          description: Beckn Context extended for Discovery.
          properties:
            schema_context:
              type: array
              items: { type: string, format: uri }
              description: Optional JSON-LD context URLs indicating entity types to search across

    EligibilityMain:
      description: |
        Eligibility constraints.
        Source: main/schema/core/v2/attributes.yaml#Eligibility
      type: object
      properties:
        eligibleRegion:
          type: string
        eligibleQuantity:
          type: object
          properties:
            min:
              type: number
            max:
              type: number

    Error:
      $id: #/components/schemas/Error/v2.0
      title: Error
      description: |
        Base error container returned in NACK responses and async error callbacks.
        Domain-specific error codes SHOULD follow the Beckn error code registry
        (see docs/11_Error_Codes.md). Custom error objects may be expressed as
        `oneOf [string, object]` payloads via the `errorDetails` field.
      type: object
      properties:
        errorCode:
          type: string
          description: Machine-readable error code per the Beckn error registry.
        errorMessage:
          type: string
          description: Human-readable error description for display or logging.
        errorDetails:
          description: |
            Optional domain-specific error details. Using oneOf to allow both simple
            string details and structured JSON-LD error objects from domain packs.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true

    ErrorMain:
      description: |
        Error response object.
        Source: main/schema/core/v2/attributes.yaml#Error
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

    ErrorResponseMain:
      description: |
        Error response envelope.
        Source: main/schema/core/v2/attributes.yaml#ErrorResponse
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorMain'

    FormInput:
      $id: https://schema.beckn.io/FormInput/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: |
        A generic input form for capturing structured feedback or rating data from a user.
        This serves as the base type for specialised input forms such as RatingInput.
      title: FormInput
      x-tags: [common]
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: "https://schema.beckn.io/"
        '@type':
          type: string
          x-jsonld:
            '@id': beckn:FormInput
        target:
          description: The entity being rated or reviewed
          type: object
          properties:
            '@context':
              type: string
              format: uri
              const: "https://schema.beckn.io/"
            '@type':
              type: string
              default: RatingTarget
              x-jsonld:
                '@id': beckn:RatingTarget
            id:
              description: ID of the entity being rated (order/item/fulfillment/provider/agent).
              type: string
            category:
              description: What is being rated. This can be any entity in the order lifecycle that influenced the overall experience
                of the user
              type: string
              enum:
              - Order
              - Fulfillment
              - FulfillmentStage
              - Provider
              - Agent
          required:
          - '@context'
          - '@type'
          - id
          - category
        range:
          oneOf:
          - type: object
            properties:
              bestRating:
                description: Maximum of the rating scale (default 5 if omitted).
                type: number
              worstRating:
                description: Minimum of the rating scale (default 1 or 0 if omitted).
                type: number
          - type: array
            description: A custom rating range indexed from 0 to n
            properties:
              index:
                type: integer
                minimum: 0
              value:
                $ref: "https://schema.beckn.io/Descriptor/v2.0"
        feedbackFormSubmission:
          description: The submission to the feedback form sent along with a rating request
          allOf:
          - $ref: "https://schema.beckn.io/FormSubmission/v2.0"
      required:
      - '@context'
      - '@type'
      - target
      - range
      additionalProperties: false

    FormMain:
      description: |
        Describes a form.
        Source: main/schema/core/v2/attributes.yaml#Form
      type: object
      required: ["@context", "@type"]
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Form"]
        url:
          type: string
          format: uri
          description: URL from where the form can be fetched.
        data:
          type: object
          additionalProperties:
            type: string
        mime_type:
          type: string
          enum:
            - text/html
            - application/xml
        submission_id:
          type: string
          format: uuid

    FulfillmentMain:
      description: |
        Core fulfillment envelope.
        Source: main/schema/core/v2/attributes.yaml#Fulfillment
      type: object
      additionalProperties: false
      required: ["@context", "@type", "beckn:mode"]
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Fulfillment"]
        beckn:id:
          type: string
        beckn:fulfillmentStatus:
          type: string
        beckn:mode:
          type: string
          enum: ["DELIVERY", "PICKUP", "RESERVATION", "DIGITAL"]
        trackingAction:
          $ref: '#/components/schemas/TrackActionMain'
        beckn:deliveryAttributes:
          $ref: '#/components/schemas/AttributesMain'

    GeoJSONGeometryMain:
      description: |
        GeoJSON geometry per RFC 7946.
        Source: main/schema/core/v2/attributes.yaml#GeoJSONGeometry
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum:
            - Point
            - LineString
            - Polygon
            - MultiPoint
            - MultiLineString
            - MultiPolygon
            - GeometryCollection
        coordinates:
          type: array
        geometries:
          type: array
          items:
            $ref: '#/components/schemas/GeoJSONGeometryMain'
        bbox:
          type: array
          minItems: 4
          maxItems: 4
      additionalProperties: true

    InitAction:
      $id: https://schema.beckn.io/InitAction/v2.0
      title: Init Action
      description: |
        Beckn /beckn/init message payload. Sent by a BAP to a BPP to initialise
        a contract with consumer details (billing address, fulfillment preferences, etc.).
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    InitMessageRavi:
      description: |
        Init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#InitMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    InReplyTo:
      $id: #/components/schemas/InReplyTo/v2.0
      title: In-Reply-To Reference
      description: |
        A cryptographic binding that ties an asynchronous `on_<action>` callback to the
        specific inbound request that triggered it. Establishes bilateral non-repudiation
        for the asynchronous leg of a Beckn interaction.

        Use `lineage` (on `Context`) for cross-transaction causality.

        Verification steps:
        1. Recompute BLAKE2b-512 digest of the original request body; compare to `digest`.
        2. Confirm `messageId` matches the `messageId` from the original request `Context`.
      type: object
      required: [messageId, digest]
      properties:
        messageId:
          type: string
          format: uuid
          description: The `messageId` of the parent request from its `Context`.
        digest:
          type: string
          pattern: '^BLAKE-512=[A-Za-z0-9+/]+=*$'
          description: |
            BLAKE2b-512 hash of the parent request body, Base64-encoded with algorithm prefix.
            Format: `BLAKE-512={base64EncodedHash}`

    Intent:
      $id: https://schema.beckn.io/Intent/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: A declaration of an intent to discover catalogs.
      title: Intent
      x-tags: [common]
      type: object
      properties:
        textSearch:
          description: Free text search query for items
          type: string
          example: gaming laptop premium tech
        filters:
          description: Filter criteria for items
          type: object
          properties:
            type:
              description: Type of filter expression
              type: string
              enum:
              - jsonpath
              default: jsonpath
            expression:
              description: Filter expression based on the specified type
              type: string
              example: $[?(@.rating.value >= 4.0 && @.electronic.brand.name == 'Premium Tech')]
          required:
          - type
          - expression
        spatial:
          description: Optional array of spatial constraints (CQL2-JSON semantics).
          type: array
          items:
            $ref: "https://schema.beckn.io/SpatialConstraint/v2.0"
        media_search:
          $ref: "https://schema.beckn.io/MediaSearch/v2.0"
      anyOf:
      - required:
        - textSearch
      - required:
        - filters
      - required:
        - spatial
      - required:
        - filters
        - spatial
      additionalProperties: false

    InvoiceMain:
      description: |
        Commercial invoice snapshot.
        Source: main/schema/core/v2/attributes.yaml#Invoice
      type: object
      additionalProperties: false
      required: ["@context", "@type", "beckn:id", "beckn:number", "beckn:issueDate", "beckn:totals", "beckn:payee", "beckn:payer"]
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Invoice"]
        beckn:id:
          type: string
        beckn:number:
          type: string
        beckn:issueDate:
          type: string
          format: date
        beckn:dueDate:
          type: string
          format: date
          nullable: true
        beckn:payee:
          type: string
          description: Provider ID reference
        beckn:payer:
          type: string
          description: Buyer ID reference
        beckn:totals:
          $ref: '#/components/schemas/PriceSpecificationMain'
        beckn:invoiceAttributes:
          $ref: '#/components/schemas/AttributesMain'

    ItemMain:
      description: |
        Core Item schema from main branch.
        Source: main/schema/core/v2/attributes.yaml#Item
      type: object
      additionalProperties: false
      required: ["@context", "@type", "beckn:id", "beckn:descriptor", "beckn:provider", "beckn:itemAttributes"]
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Item"]
        "beckn:id":
          type: string
        "beckn:descriptor":
          $ref: '#/components/schemas/DescriptorMain'
        "beckn:category":
          $ref: '#/components/schemas/CategoryCodeMain'
        "beckn:availableAt":
          type: array
          items:
            $ref: '#/components/schemas/LocationMain'
        "beckn:availabilityWindow":
          type: array
          items:
            $ref: '#/components/schemas/TimePeriodMain'
        "beckn:rateable":
          type: boolean
        "beckn:rating":
          $ref: '#/components/schemas/RatingMain'
        "beckn:isActive":
          type: boolean
          default: true
        "beckn:networkId":
          type: array
          items:
            type: string
        "beckn:provider":
          $ref: '#/components/schemas/ProviderMain'
        "beckn:itemAttributes":
          $ref: '#/components/schemas/AttributesMain'

    LocationMain:
      description: |
        A place represented by GeoJSON geometry and optional address.
        Source: main/schema/core/v2/attributes.yaml#Location
      type: object
      required: [geo]
      additionalProperties: false
      properties:
        "@type":
          type: string
          enum: ["beckn:Location"]
        geo:
          $ref: '#/components/schemas/GeoJSONGeometryMain'
        address:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/AddressMain'

    MediaInputAbhishek:
      $id: https://schema.beckn.io/AbhishekMediaInput/v2.0
      type: object
      required: [type, url]
      properties:
        id: { type: string }
        type: { type: string, enum: [image, audio, video] }
        url: { type: string, format: uri }
        contentType: { type: string }
        textHint: { type: string }
        language: { type: string }
        startMs: { type: integer }
        endMs: { type: integer }
      additionalProperties: false

    MediaSearchAbhishek:
      $id: https://schema.beckn.io/AbhishekMediaSearch/v2.0
      type: object
      properties:
        media:
          type: array
          items: { $ref: '#/components/schemas/MediaInputAbhishek' }
        options: { $ref: '#/components/schemas/MediaSearchOptionsAbhishek' }
      additionalProperties: false

    MediaSearchOptionsAbhishek:
      $id: https://schema.beckn.io/AbhishekMediaSearchOptions/v2.0
      type: object
      properties:
        goals:
          type: array
          items:
            type: string
            enum: [visual-similarity, visual-object-detect, text-from-image, text-from-audio, semantic-audio-match, semantic-video-match]
        augment_text_search: { type: boolean, default: true }
        restrict_results_to_media_proximity: { type: boolean, default: false }
      additionalProperties: false

    NackBadRequest:
      title: NACK — Bad Request
      description: Malformed or invalid request; the server could not parse or validate the payload.
      allOf:
        - $ref: '#/components/schemas/Ack'
        - type: object
          properties:
            status:
              type: string
              const: NACK
            error:
              $ref: '#/components/schemas/Error'

    NackUnauthorized:
      title: NACK — Unauthorized
      description: Invalid or missing authentication credentials; signature could not be verified.
      allOf:
        - $ref: '#/components/schemas/Ack'
        - type: object
          properties:
            status:
              type: string
              const: NACK
            error:
              $ref: '#/components/schemas/Error'

    OfferAbhishek:
      $id: https://schema.beckn.io/AbhishekOffer/v2.0
      type: object
      description: >
        A generalized, cross-domain Offer that captures the terms under which
        one or more Resources may be committed.

        Core intent:
        - Support multiple terms/eligibility/constraints/price points for the same Resource(s)
        - Support dynamic / on-the-fly offers (e.g., bundling, combinational discounts,
          eligibility changes, capacity-aware pricing)

        This mirrors the role of Offer in current Beckn (and schema.org patterns),
        but keeps the shape minimal and composable via `beckn:offerAttributes`.
      required: ["@context", "@type", "beckn:id", "beckn:proposer", "beckn:status"]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Offer schema
        "@type":
          type: string
          description: Type of the core Offer
          enum: ["beckn:Offer"]
        beckn:id:
          type: string
          description: Unique identifier of the offer.
        beckn:status:
          type: string
          description: Current lifecycle state of the offer.
          enum: [ACTIVE, EXPIRED, WITHDRAWN]
        beckn:proposer:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Provider'
        beckn:resourceRefs:
          type: array
          description: References (IDs) to resources covered by this offer.
          items: { type: string }
        beckn:addOnRefs:
          type: array
          description: IDs of optional extra Offers or Resources that can be attached.
          items: { type: string }
        beckn:proposedConsideration:
          type: object
          description: Optional proposed exchange value (monetary or otherwise).
          additionalProperties: true
        beckn:validity:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/TimePeriod'
        beckn:availableTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this entity.

            If omitted, the entity is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.
        beckn:offerAttributes:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'

    OfferMain:
      description: |
        Core Offer schema from main branch.
        Source: main/schema/core/v2/attributes.yaml#Offer
      type: object
      additionalProperties: false
      required:
        - "@context"
        - "@type"
        - beckn:id
        - beckn:descriptor
        - beckn:provider
        - beckn:items
      properties:
        "@context":
          type: string
          format: uri
        "@type":
          type: string
          enum: ["beckn:Offer"]
        beckn:id:
          type: string
        beckn:descriptor:
          $ref: '#/components/schemas/DescriptorMain'
        beckn:provider:
          type: string
          description: Provider ID reference
        beckn:items:
          type: array
          minItems: 1
          items:
            type: string
            description: Item ID reference
        beckn:addOns:
          type: array
          items:
            type: string
            description: Add-on offer ID reference
        beckn:addOnItems:
          type: array
          items:
            type: string
            description: Add-on item ID reference
        beckn:isActive:
          type: boolean
          default: true
        beckn:validity:
          $ref: '#/components/schemas/TimePeriodMain'
        beckn:price:
          $ref: '#/components/schemas/PriceSpecificationMain'
        beckn:eligibleRegion:
          type: array
          items:
            $ref: '#/components/schemas/LocationMain'
        beckn:acceptedPaymentMethod:
          $ref: '#/components/schemas/AcceptedPaymentMethodMain'
        beckn:offerAttributes:
          $ref: '#/components/schemas/AttributesMain'

    OnCancelAction:
      $id: https://schema.beckn.io/OnCancelAction/v2.0
      title: On Cancel Action
      description: |
        Beckn /beckn/on_cancel message payload. Sent by a BPP to a BAP in
        response to a /beckn/cancel call, returning the contract with status
        set to CANCELLED and any applicable cancellation outcome.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnCancelConfirmMessageRavi:
      description: |
        On cancel confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnCancelConfirmMessage
      type: object
      required:
        - cancelAction
      properties:
        cancelAction:
          type: object
          properties:
            order:
              allOf:
                - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'
                - required: [cancellationPolicy, cancellationOutcome, docs]
            reason:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/CancellationReason'

    OnCancelInitMessageRavi:
      description: |
        On cancel init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnCancelInitMessage
      type: object
      required:
        - cancelAction
      properties:
        cancelAction:
          type: object
          properties:
            order:
              allOf:
                - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'
                - required: [beckn:id, beckn:cancellationPolicy]
            reason:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/CancellationDetails'

    OnCatalogPublishMessageRavi:
      description: |
        On catalog publish callback from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnCatalogPublishMessage
      type: object
      required:
        - results
      properties:
        results:
          type: array
          description: Per-catalog processing results
          items:
            $ref: '#/components/schemas/CatalogProcessingResultRavi'

    OnConfirmAction:
      $id: https://schema.beckn.io/OnConfirmAction/v2.0
      title: On Confirm Action
      description: |
        Beckn /beckn/on_confirm message payload. Sent by a BPP to a BAP in
        response to a /beckn/confirm call, returning the confirmed contract
        with status set to CONFIRMED.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnConfirmMessageRavi:
      description: |
        On confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnConfirmMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    OnDiscoverAction:
      description: The on_discover response payload containing matching catalogs.
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          description: |
            Array of catalogs matching the discovery request.
            Note: Each catalog's `items` array carries `oneOf [Item, Resource]` entries:
            - `Item` — legacy 2.0-rc1 catalog item (backward compatible)
            - `Resource` — new cross-domain resource abstraction (generalized)
            Both types share the common `id` + `descriptor` surface for display rendering.
            See `#/components/schemas/Catalog/v2.0` for the full Catalog schema.
          items:
            $ref: '#/components/schemas/Catalog/v2.0'

    # ── External xAction Envelope Schemas (from schema.beckn.io) ───
    # These are the full-envelope schemas as published at schema.beckn.io.
    # The context + message wrapper has been stripped; only the message
    # payload content is inlined here (since context is already declared
    # inline on each endpoint's requestBody). The $id points to the
    # canonical URI at schema.beckn.io.

    OnDiscoverActionExternal:
      $id: https://schema.beckn.io/OnDiscoverAction/v2.0
      title: On Discover Action (External)
      description: |
        Beckn /beckn/on_discover message payload as published at schema.beckn.io.
        Contains the array of matching Catalog objects.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/Catalog'
      required:
        - catalogs

    # ── xAction Message Schemas (from schema.beckn.io, message-content only) ──

    OnDiscoverMessageRavi:
      description: |
        On discover message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnDiscoverMessage
      type: object
      required:
        - catalogs
      properties:
        catalogs:
          type: array
          items:
            $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Catalog'

    OnInitAction:
      $id: https://schema.beckn.io/OnInitAction/v2.0
      title: On Init Action
      description: |
        Beckn /beckn/on_init message payload. Sent by a BPP to a BAP in response
        to a /beckn/init call, with the updated contract including payment terms
        and billing confirmation.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnInitMessageRavi:
      description: |
        On init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnInitMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    OnRateAction:
      $id: https://schema.beckn.io/OnRateAction/v2.0
      title: On Rate Action
      description: |
        Beckn /beckn/on_rate message payload. Sent by a BPP to a BAP in
        response to a /beckn/rate call, optionally returning rating forms
        to collect structured feedback from the consumer.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        ratingForms:
          type: array
          items:
            $ref: '#/components/schemas/RatingForm'
      required:
        - ratingForms

    OnRateConfirmMessageRavi:
      description: |
        On rate confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnRateConfirmMessage
      type: object
      required:
        - rating
      properties:
        order:
          type: object
          properties:
            beckn:id:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order/properties/id'
        ratings:
          type: array
          items:
            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Rating'
        feedback:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Feedback'

    OnRateInitMessageRavi:
      description: |
        On rate init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnRateInitMessage
      type: object
      required:
        - order
      properties:
        order:
          type: object
          properties:
            beckn:id:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order/properties/id'
        ratings:
          type: array
          items:
            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Rating'
        feedback:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Feedback'

    OnRateMessage:
      $id: #/components/schemas/OnRateMessage/v2.0
      description: |
        Rating acknowledgement with optional aggregate snapshot.
        - `context.try: true` — returns the rating form/criteria.
        - `context.try: false` — confirms rating was received and recorded.
      type: object
      properties:
        received:
          type: boolean
          default: true
          description: Confirms the rating was received and processed.
        aggregate:
          type: object
          description: Optional aggregated rating snapshot for display
          properties:
            count:
              type: integer
              minimum: 0
            value:
              type: number
              minimum: 0
            bestRating:
              type: number
              minimum: 0
            worstRating:
              type: number
              minimum: 0
        feedbackForm:
          $ref: '#/components/schemas/Form/v2.0'
        ratingForm:
          $ref: '#/components/schemas/RatingForm/v2.0'

    # ── Support Messages ────────────────────────────────────────────

    OnSelectAction:
      $id: https://schema.beckn.io/OnSelectAction/v2.0
      title: On Select Action
      description: |
        Beckn /beckn/on_select message payload. Sent by a BPP to a BAP in
        response to a /beckn/select call, with updated contract terms.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnSelectMessageRavi:
      description: |
        On select message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnSelectMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    OnStatusAction:
      $id: https://schema.beckn.io/OnStatusAction/v2.0
      title: On Status Action
      description: |
        Beckn /beckn/on_status message payload. Sent by a BPP to a BAP in
        response to a /beckn/status call (or as an unsolicited status push),
        returning the current state of the contract.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnStatusMessageRavi:
      description: |
        On status message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnStatusMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    OnSupportAction:
      $id: https://schema.beckn.io/OnSupportAction/v2.0
      title: On Support Action
      description: |
        Beckn /beckn/on_support message payload. Sent by a BPP to a BAP in
        response to a /beckn/support call, returning support contact details
        and available channels.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        supportInfo:
          allOf:
            - $ref: '#/components/schemas/SupportInfo'
      required:
        - supportInfo

    # ── Transaction Messages (backward-compatible) ──────────────────

    OnSupportConfirmMessageRavi:
      description: |
        On support confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnSupportConfirmMessage
      type: object
      required:
        - support
      properties:
        support:
          type: object
          properties:
            order:
              type: object
              properties:
                beckn:id:
                  $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order/properties/id'
              required:
                - beckn:id
            methods:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/SupportMethods'
            tickets:
              type: array
              items:
                - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Ticket'

    OnSupportInitMessageRavi:
      description: |
        On support init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnSupportInitMessage
      type: object
      required:
        - support
      properties:
        support:
          type: object
          properties:
            order:
              type: object
              properties:
                beckn:id:
                  $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order/properties/id'
              required:
                - beckn:id
            methods:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/SupportMethods'
            tickets:
              type: array
              items:
                - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Ticket'

    OnSupportMessage:
      $id: #/components/schemas/OnSupportMessage/v2.0
      description: Support response with available channels and/or ticket details.
      type: object
      required: [support]
      properties:
        support:
          $ref: '#/components/schemas/Support/v2.0'

    # ── Catalog Publishing Messages ─────────────────────────────────

    OnTrackAction:
      $id: https://schema.beckn.io/OnTrackAction/v2.0
      title: On Track Action
      description: |
        Beckn /beckn/on_track message payload. Sent by a BPP to a BAP in
        response to a /beckn/track call, returning a Tracking handle with
        the URL and/or WebSocket endpoint for real-time fulfillment tracking.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        tracking:
          allOf:
            - $ref: '#/components/schemas/Tracking'
      required:
        - tracking

    OnTrackMessage:
      $id: #/components/schemas/OnTrackMessage/v2.0
      description: Real-time tracking response with URL or tracking handle.
      type: object
      required: [tracking]
      properties:
        tracking:
          $ref: '#/components/schemas/Tracking/v2.0'

    # ── Cancel Message ──────────────────────────────────────────────

    OnTrackMessageRavi:
      description: |
        On track message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnTrackMessage
      type: object
      required:
        - tracking
      properties:
        tracking:
          allOf:
            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/TrackAction'
            - required: [orderId, refId]

    OnUpdateAction:
      $id: https://schema.beckn.io/OnUpdateAction/v2.0
      title: On Update Action
      description: |
        Beckn /beckn/on_update message payload. Sent by a BPP to a BAP in
        response to a /beckn/update call (or as an unsolicited update push),
        returning the updated contract state.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnUpdateConfirmMessageRavi:
      description: |
        On update confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnUpdateConfirmMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    OnUpdateInitMessageRavi:
      description: |
        On update init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#OnUpdateInitMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    OrderItemMain:
      description: |
        A line item within an Order.
        Source: main/schema/core/v2/attributes.yaml#OrderItem
      type: object
      required: ["beckn:orderedItem"]
      properties:
        beckn:lineId:
          type: string
        beckn:orderedItem:
          type: string
          description: Item ID reference
        beckn:acceptedOffer:
          $ref: '#/components/schemas/OfferMain'
        beckn:quantity:
          $ref: '#/components/schemas/QuantityMain'
        beckn:price:
          $ref: '#/components/schemas/PriceSpecificationMain'
        beckn:orderItemAttributes:
