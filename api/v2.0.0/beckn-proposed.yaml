        ratings:
          type: array
          items:
            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Rating'
        feedback:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Feedback'

    RateInitMessageRavi:
      description: |
        Rate init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#RateInitMessage
      type: object
      required:
        - order
      properties:
        order:
          type: object
          properties:
            beckn:id:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order/properties/id'

    RateMessage:
      $id: #/components/schemas/RateMessage/v2.0
      description: |
        Rating submission payload.
        - `context.try: true` — BAP requests the rating form/criteria (preview).
        - `context.try: false` — BAP submits actual ratings.
      type: object
      required: [ratings]
      properties:
        ratings:
          type: array
          minItems: 1
          description: One or more rating inputs for different aspects of the transaction
          items:
            $ref: '#/components/schemas/RatingInput/v2.0'

    RatingForm:
      $id: https://schema.beckn.io/RatingForm/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: A form designed to capture rating and feedback from a user. This can be used by both BAP and BPP to fetch ratings
        and feedback of their respective users.
      title: RatingForm
      x-tags: [common]
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: "https://schema.beckn.io/"
        '@type':
          type: string
          default: RatingForm
          x-jsonld:
            '@id': beckn:RatingForm
          target:
            description: The entity being rated
            type: object
            properties:
              '@context':
                type: string
                format: uri
                const: "https://schema.beckn.io/"
              '@type':
                type: string
                default: RatingTarget
                x-jsonld:
                  '@id': beckn:RatingTarget
              id:
                description: IF of the entity being rated (order/item/fulfillment/provider/agent).
                type: string
              ratingTargetType:
                description: What is being rated. This can be any entity in the order lifecycle that influenced the overall experience
                  of the user
                type: string
                enum:
                - Order
                - Fulfillment
                - FulfillmentStage
                - Provider
                - Agent
          range:
            oneOf:
            - type: object
              properties:
                bestRating:
                  description: Maximum of the rating scale (default 5 if omitted).
                  type: number
                worstRating:
                  description: Minimum of the rating scale (default 1 or 0 if omitted).
                  type: number
            - type: array
              description: A custom rating range indexed from 0 to n
              properties:
                index:
                  type: integer
                  minimum: 0
                value:
                  $ref: "https://schema.beckn.io/Descriptor/v2.0"
          feedbackForm:
            description: A feedback form sent along with a rating request
            allOf:
            - $ref: "https://schema.beckn.io/Form/v2.0"
          feedbackRequired:
            type: boolean
            description: Specifies whether feedback after rating is required for acceptance of rating
        required:
        - '@context'
        - '@type'
        - target
        - feedbackRequired
      additionalProperties: false

    RatingInput:
      $id: https://schema.beckn.io/RatingInput/v2.0
      title: RatingInput
      description: |
        A rating input form. Extends FormInput with the @type fixed to beckn:RatingForm,
        indicating that this form instance is specifically a rating form.
      allOf:
        - $ref: '#/components/schemas/FormInput'
