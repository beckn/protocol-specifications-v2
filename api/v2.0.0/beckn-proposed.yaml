          minimum: 0
        bestRating:
          type: number
        worstRating:
          type: number
        category:
          type: string
          enum: [ORDER, FULFILLMENT, ITEM, PROVIDER, AGENT, OTHER]
        feedback:
          type: object
          additionalProperties: false
          properties:
            comments:
              type: string
            tags:
              type: array
              items:
                type: string

    RatingMain:
      description: |
        Rating.
        Source: main/schema/core/v2/attributes.yaml#Rating
      type: object
      required: ["@type"]
      properties:
        "@type":
          type: string
          enum: ["beckn:Rating"]
        "beckn:ratingValue":
          type: number
          minimum: 0
          maximum: 5
        "beckn:ratingCount":
          type: integer
          minimum: 0

    Resource:
      $id: https://schema.beckn.io/Resource/v2.0
      type: object
      description: >
        A minimal, domain-neutral abstraction representing any discoverable,
        referenceable, or committable unit of value, capability, service,
        entitlement, or asset within the network.

        Examples:
        - A retail product SKU, a mobility ride, a job role, a carbon credit unit,
          a dataset/API entitlement, a training course, a clinic service slot.

        Designed for composability through `resourceAttributes` where
        domain packs can plug in their specific fields without changing the core.
      required: ["@context", "@type", "id", "descriptor"]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          const: "beckn:Resource"
        id:
          type: string
          description: Globally unique identifier of the resource.
        descriptor:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Descriptor'
        provider:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Provider'
        isAvailable:
          type: boolean
          default: true
          description: |
            Whether the resource is currently available for discovery/commitment.
            This allows temporary suspension without deleting the resource.
        visibleTo:
          type: array
          description: >
            Optional visibility constraint indicating which network participants
            (by participantId / networkId / role) are allowed to discover or
            transact on this entity.

            If omitted, the entity is assumed to be visible to all participants
            in the addressed network(s).
          items:
            type: object
            required: [type, id]
            properties:
              type:
                type: string
                enum: [NETWORK, PARTICIPANT, ROLE]
                description: Scope of visibility constraint.
              id:
                type: string
                description: Identifier of the network, participant, or role.
        resourceAttributes:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'

    SelectAction:
      $id: https://schema.beckn.io/SelectAction/v2.0
      title: Select Action
      description: |
        Beckn /beckn/select message payload. Sent by a BAP to a BPP to select
        items and offers from a catalog, initiating the negotiation cycle.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    SelectMessageRavi:
      description: |
        Select message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#SelectMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Order'

    ServerError:
      $id: #/components/schemas/ServerError/v2.0
      title: Server Error
      description: |
        Internal failure on the network participant's platform; the request could not be processed.
        The response body MAY contain an `error` object with additional details.
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'

    SettlementAbhishek:
      $id: https://schema.beckn.io/AbhishekSettlement/v2.0
      type: object
      description: >
        Represents the discharge of agreed consideration under a Contract.

        Settlement may occur via:
          - Monetary payment
          - Token or credit transfer
          - Asset movement
          - Capacity allocation
          - Service exchange
          - Other domain-specific mechanisms.
      required:
        - "@context"
        - "@type"
        - beckn:type
        - beckn:status
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          enum: ["beckn:Settlement"]
        beckn:type:
          type: string
          enum: [MONETARY, TOKEN, CREDIT, ASSET, SERVICE, OTHER]
        beckn:status:
          type: string
          enum: [INITIATED, PENDING, COMPLETED, FAILED, CANCELLED]
        beckn:amount:
          type: object
          description: >
            Applicable for monetary or token settlements.
          additionalProperties: true
        beckn:considerationRefs:
          type: array
          description: Consideration obligations discharged by this settlement.
          items:
            type: string
        beckn:settlementRef:
          type: string
          description: >
            External transaction reference (e.g., payment gateway ID,
            blockchain tx hash, clearing reference).
        beckn:settlementAttributes:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/Attributes'

    Signature:
      title: Beckn HTTP Signature
      description: |
        A digitally signed authentication credential in the HTTP `Authorization` header.
        Follows draft-cavage-http-signatures-12 as profiled by BECKN-006.

        Format:
        ```
        Signature keyId="{subscriberId}|{uniqueKeyId}|{algorithm}",
          algorithm="{algorithm}",created="{unixTimestamp}",expires="{unixTimestamp}",
          headers="{signedHeaders}",signature="{base64Signature}"
        ```

        | Attribute | Description |
        |-----------|-------------|
        | `keyId` | `{subscriberId}|{uniqueKeyId}|{algorithm}` — FQDN, registry UUID, algorithm |
        | `algorithm` | MUST be `ed25519` |
        | `created` | Unix timestamp when the signature was created |
        | `expires` | Unix timestamp when the signature expires |
        | `headers` | Space-separated signed headers. MUST include `(created)`, `(expires)`, `digest` |
        | `signature` | Base64-encoded Ed25519 signature over the signing string |

        Signing string:
        `(created): {value}\n(expires): {value}\ndigest: BLAKE-512={digest}`
        where `digest` is a BLAKE2b-512 hash of the request body, Base64-encoded.
      type: string
      pattern: '^Signature keyId="[^|"]+\|[^|"]+\|[^"]+",algorithm="[^"]+",created="\d+",expires="\d+",headers="[^"]+",signature="[A-Za-z0-9+/]+=*"$'


    SpatialConstraintAbhishek:
      $id: https://schema.beckn.io/AbhishekSpatialConstraint/v2.0
      type: object
      required: [op, targets]
      properties:
        op:
          type: string
          enum: [s_within, s_contains, s_intersects, s_disjoint, s_overlaps, s_crosses, s_touches, s_equals, s_dwithin]
        targets:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        geometry: { $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-new/refs/heads/main/schema/core/v2/attributes.yaml#/components/schemas/GeoJSONGeometry' }
        distanceMeters: { type: number, minimum: 0 }
        quantifier:
          type: string
          enum: [any, all, none]
          default: any
      additionalProperties: false

    StatusAction:
      $id: https://schema.beckn.io/StatusAction/v2.0
      title: Status Action
      description: |
        Beckn /beckn/status message payload. Sent by a BAP to a BPP to query
