          default: RatingForm
        target:
          description: The thing being rated. It could be a person, an application, a service, a product, an instrument used in the fulfillment of the contract, or the overall experience.
          type: object
          properties:
            id:
              description: ID of the entity being rated (order/item/fulfillment/provider/agent).
              type: string
            descriptor:
              $ref: '#/components/schemas/Descriptor'
            targetAttributes:
              $ref: '#/components/schemas/Attributes'

        range:
          oneOf:
          - type: object
            properties:
              bestRating:
                description: Maximum of the rating scale (default 5 if omitted).
                type: number
              worstRating:
                description: Minimum of the rating scale (default 1 or 0 if omitted).
                type: number
          - type: array
            description: A custom rating range indexed from 0 to n
            properties:
              index:
                type: integer
                minimum: 0
              value:
                $ref: "https://schema.beckn.io/Descriptor/v2.1"
        feedbackFormSubmission:
          description: The submission to the feedback form sent along with a rating request
          $ref: https://schema.beckn.io/FormSubmission/v2.0
      required:
      - '@context'
      - '@type'
      - target
      - range
      additionalProperties: false

    Resource:
      $id: 'https://schema.beckn.io/Resource/v2.0'
      type: object
      description: |
        A minimal, domain-neutral abstraction representing any discoverable,
        referenceable, or committable unit of value, capability, service,
        entitlement, or asset within the network.

        Examples:
        - A retail product SKU, a mobility ride, a job role, a carbon credit unit,
          a dataset/API entitlement, a training course, a clinic service slot.

        Designed for composability through `resourceAttributes` where
        domain packs can plug in their specific fields without changing the core.
      required: ["@context", "@type", "id", "descriptor"]
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD context URI for the core Resource schema
        "@type":
          type: string
          description: Type of the core Resource
          const: "beckn:Resource"
        id:
          type: string
          description: Globally unique identifier of the resource.
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        resourceAttributes:
          description: All the properties of a resource that describe its value, its terms of usage, fulfillment, and consideration
          $ref: '#/components/schemas/Attributes'

    Settlement:
      $id: 'https://schema.beckn.io/Settlement/v2.0'
      type: object
      properties:
        "@context":
          type: string
          format: uri
          description: The domain-specific context in which this settlement is taking place.
          examples:
            - https://schema.beckn.io/Settlement/2.0/context.jsonld 
            - https://schema.beckn.io/RetailOrderSettlement/2.0/context.jsonld 
            - https://schema.beckn.io/P2PTradeSettlement/context.jsonld
        "@type":
          type: string
          description: Type of settlement within the context of this settlement
          examples:
            - "beckn:Settlement"
            - "beckn:MonetaryTransfer"
            - "beckn:TokenTransfer"
            - "beckn:CreditSettlement"
            - "beckn:AssetTransfer"
            - "beckn:ServiceSettlement"
          default: "beckn:MonetaryTransfer"
        id:
          type: string
        #@Ravi Cant a settlement be against multiple considerations? 
        considerationId:
          $ref: '#/components/schemas/Consideration/properties/id'
        status:
          type: string
          enum:
            - DRAFT
            - COMMITTED
            - COMPLETE
        settlementAttributes:
          $ref: '#/components/schemas/Attributes'

    # The current model is very powerful, but it introduces orchestration semantics into the protocol. My proposal is to keep Settlement minimal in core and move workflow constructs like terms, actions, triggers into a settlement extension pack via settlementAttributes. 

    # Removing Schedule from here as it is not used - please shift it to schema repo as a reuseable scehma. 

    Signature:
      title: Beckn HTTP Signature
      description: |
        A digitally signed authentication credential in the HTTP `Authorization` header.
        Follows draft-cavage-http-signatures-12 as profiled by BECKN-006.

        format:
        ```
        Signature keyId="{subscriberId}|{uniqueKeyId}|{algorithm}",
          algorithm="{algorithm}",created="{unixTimestamp}",expires="{unixTimestamp}",
          headers="{signedHeaders}",signature="{base64Signature}"
        ```

        | Attribute | Description |
        |-----------|-------------|
        | `keyId` | `{subscriberId}|{uniqueKeyId}|{algorithm}` — FQDN, registry UUID, algorithm |
        | `algorithm` | MUST be `ed25519` |
        | `created` | Unix timestamp when the signature was created |
        | `expires` | Unix timestamp when the signature expires |
        | `headers` | Space-separated signed headers. MUST include `(created)`, `(expires)`, `digest` |
        | `signature` | Base64-encoded Ed25519 signature over the signing string |

        Signing string:
        `(created): {value}\n(expires): {value}\ndigest: BLAKE-512={digest}`
        where `digest` is a BLAKE2b-512 hash of the request body, Base64-encoded.
      type: string
      pattern: '^Signature keyId="[^|"]+\|[^|"]+\|[^"]+",algorithm="[^"]+",created="\d+",expires="\d+",headers="[^"]+",signature="[A-Za-z0-9+/]+=*"$'

    Support:
      $id: https://schema.beckn.io/Support
      description: Describes a support session
        info
      title: Support
      type: object
      properties:
        '@context':
          type: string
          format: uri
          default: https://schema.beckn.io/
        '@type':
          type: string
          const: "beckn:Support"
        orderId:
          description: The order against which support is required
          type: string
        descriptor:
          description: A description of the nature of support needed
          $ref: '#/components/schemas/Descriptor'
        channels:
          description: Available support channels described in individual linked data JSON objects
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Attributes'
      required:
      - '@context'
      - '@type'
      additionalProperties: false
    
    TimePeriod:
      $id: "https://schema.beckn.io/TimePeriod/v2.1"
      description: Time window with date-time precision for availability/validity
      title: TimePeriod
      x-tags: [common]
      type: object
      properties:
        '@context':
          description: JSON-LD type for a date-time period
          type: string
          const: "https://schema.beckn.io/TimePeriod/v2.1"
        '@type':
          description: JSON-LD type for a date-time period
          type: string
          const: TimePeriod
        startDate:
          description: Start instant (inclusive)
          type: string
          format: date-time
          example: '2025-01-27T09:00:00Z'
        endDate:
          description: End instant (exclusive or inclusive per domain semantics)
          type: string
          format: date-time
          example: '2025-12-31T23:59:59Z'
        startTime:
          description: Start time of the time period
          type: string
          format: time
          example: 09:00:00
        endTime:
          description: End time of the time period
          type: string
          format: time
          example: '22:00:00'
      required:
      - '@type'
      anyOf:
      - required:
        - startDate
      - required:
        - endDate
      - required:
        - startTime
        - endTime
      additionalProperties: false

    Tracking:
      $id: https://schema.beckn.io/Tracking
      description: Information regarding live tracking of the fufillment of a contract 
      title: Tracking
      type: object
      properties:
        '@context':
          description: TBD
          type: string
          format: uri
          default: https://schema.beckn.io/
        '@type':
          description: TBD
          type: string
          default: beckn:Tracking
        refId:
          description: Tracking reference ID for the tracking session. Could be the Order ID, Fulfillment ID, Fulfillment Stage ID, or any other unique tracking identifier
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - NOT-SUPPORTED
        url:
          description: Link/handle to off-network tracking UI or endpoint.
          type: string
          format: uri

      required:
      - '@context'
      - '@type'
      - url
      - status

    # ── Catalog extension (subscription, master search, pull) ─────────────────

    CatalogSubscribeAction:
      type: object
      description: |
        Message payload for catalog/subscribe.
        At least one of `networkIds` or `schemaTypes` must be non-empty.
        An empty `schemaTypes` array is treated as the wildcard sentinel `"*"`,
        matching all schema types for the specified networks.
      required: [subscription]
      properties:
        subscription:
          type: object
          required: [networkIds]
          properties:
            networkIds:
              type: array
              items:
                type: string
              description: Network IDs to subscribe to
            schemaTypes:
              type: array
              items:
                type: string
              description: Schema type URIs to filter on (empty = wildcard)
            callbackUrl:
              type: string
              format: uri
              description: Override callback URL (defaults to context.bapUri)
            deliveryPolicy:
              $ref: '#/components/schemas/DeliveryPolicy'

    CatalogSubscription:
      type: object
      description: Full subscription record
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
          description: Subscription UUID
        networkIds:
          type: array
          items:
            type: string
          description: Network IDs covered by this subscription
        schemaTypes:
          type: array
          items:
            type: string
          description: Schema type URIs filtered by this subscription (empty = wildcard "*")
        callbackUrl:
          type: string
          format: uri
          description: Delivery callback URL
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DELETED]
          description: Lifecycle status of the subscription
        deliveryPolicy:
          $ref: '#/components/schemas/DeliveryPolicy'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DeliveryPolicy:
      type: object
      description: Callback delivery retry configuration
      properties:
        timeoutSeconds:
          type: integer
          default: 30
          description: Per-request HTTP timeout in seconds
        maxPayloadBytes:
          type: integer
          description: Maximum callback payload size in bytes
        retryPolicy:
          type: object
          properties:
            maxRetries:
              type: integer
              default: 5
              description: Maximum retry attempts before sending to DLT
            initialDelaySeconds:
              type: integer
              default: 5
              description: Base delay before first retry
            maxDelaySeconds:
              type: integer
              default: 300
              description: Maximum delay cap for exponential backoff
            backoffMultiplier:
              type: number
              default: 2.0
              description: Delay multiplied by this after each retry

    Pagination:
      type: object
      description: Pagination metadata returned with list responses
      properties:
        count:
          type: integer
          description: Number of items in this page
        limit:
          type: integer
          description: Page size used in this response
        offset:
          type: integer
          description: Zero-based offset used in this response

    CatalogEnvelope:
      type: object
      description: |
        Full catalog envelope returned in master search responses.
        Sourced from `catalog.json` committed to the master item's bare git repo at index time.
        All published catalog fields (`bppUri`, full `descriptor`, etc.) are present.
      properties:
        id:
          type: string
          description: Catalog identifier
        bppId:
          type: string
        bppUri:
          type: string
          format: uri
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        items:
          type: array
          items:
            type: object
            description: Full item JSON from git (domain-specific shape)
            additionalProperties: true

    CatalogPullAction:
      type: object
      description: Message payload for catalog/pull
      required: [mode]
      properties:
        mode:
          type: string
          enum: [FULL, INCREMENTAL]
          description: |
            - `FULL` — returns the latest version of each matching catalog.
            - `INCREMENTAL` — returns all catalog versions indexed between
              `fromDate` and `toDate` (inclusive).
        filters:
          type: object
          description: Optional filters narrowing which catalogs are returned
          properties:
            networkIds:
              type: array
              items:
                type: string
              description: Filter by network IDs (empty = all networks)
              default: []
            schemaTypes:
              type: array
              items:
                type: string
              description: Filter by schema type URIs (empty = all types)
              default: []
        catalogIds:
          type: array
          items:
            type: string
          description: Explicit catalog IDs to pull (alternative to filters)
        limit:
          type: integer
          minimum: 1
          description: Maximum number of catalogs to return (server may apply its own cap)
        fromDate:
          type: string
          format: date-time
          description: Inclusive lower bound for INCREMENTAL mode
        toDate:
          type: string
          format: date-time
          description: Inclusive upper bound for INCREMENTAL mode

    PullMode:
      type: string
      enum: [FULL, INCREMENTAL]
      description: |
        - `FULL` — returns the latest version of each matching catalog.
        - `INCREMENTAL` — returns all catalog versions indexed between
          `fromDate` and `toDate` (inclusive).

    PullFilter:
      type: object
      description: Optional filters narrowing which catalogs are returned
      properties:
        networkIds:
          type: array
          items:
            type: string
          description: Filter by network IDs (empty = all networks)
          default: []
        schemaTypes:
          type: array
          items:
            type: string
          description: Filter by schema type URIs (empty = all types)
          default: []

    CatalogPullRequest:
      type: object
      description: Request body for POST /catalog/pull
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/Context'
            - type: object
              properties:
                action:
                  type: string
                  const: catalog/pull
        message:
          $ref: '#/components/schemas/CatalogPullAction'

    PullAckResponse:
      type: object
      description: Immediate HTTP 200 ACK — processing continues asynchronously
      required: [status, requestId]
      properties:
        status:
          type: string
          const: ACK
        requestId:
          type: string
          format: uuid
          description: UUID v4 generated for this pull request; echoed in callback and result download path

    PullObjectUrl:
      type: object
      description: |
        Present in the callback when the payload exceeds the inline threshold.
        The BAP should GET `url` to download the full result.
      required: [url, format, sizeBytes, checksum]
      properties:
        url:
          type: string
          description: |
            Download URL. For local storage: `/catalog/pull/result/{requestId}/catalogs.json`.
            For GCS: a signed URL with expiry.
        expiresAt:
          type: string
          format: date-time
          description: Expiry timestamp for signed URLs (GCS); absent for local URLs
        format:
          type: string
          enum: [json, json.gz]
          description: File format of the result
        sizeBytes:
          type: integer
          format: int64
          description: Size of the result file in bytes
        checksum:
          type: string
          description: "SHA-256 checksum in the form `sha256:<hex>`"
          example: sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855

    PullCallbackContext:
      type: object
      description: Context block in the async pull callback
      required: [version, action, bapUri, timestamp]
      properties:
        version:
          type: string
        action:
          type: string
          const: on_catalog_pull
        bapId:
          type: string
        bapUri:
          type: string
          format: uri
        timestamp:
          type: string
          format: date-time
        messageId:
          type: string
          format: uuid
        transactionId:
          type: string
          format: uuid

    PullResultFile:
      type: object
      description: |
        JSON body of `GET /catalog/pull/result/{requestId}/catalogs.json`.
        Same structure as the inline `catalog` array in the callback payload —
        a list of distribution-envelope catalog objects.
      properties:
        catalogs:
          type: array
          items:
            type: object
            description: Full catalog distribution envelope (context + message + meta)
            additionalProperties: true

    CatalogAuthErrorResponse:
      type: object
      description: |
        NACK returned when Beckn HTTP Signature verification fails (catalog extension).
        Align with the standard `Error` schema where possible; kept for backward compatibility
        with existing catalog extension consumers.
      required: [status, error]
      properties:
        status:
          type: string
          const: NACK
        error:
          $ref: '#/components/schemas/Error'

  # ── Ack schema (shared by Ack, AckNoCallback, NackBadRequest, NackUnauthorized responses) ──
    AckSchema:
      $id: 'https://schema.beckn.io/Ack'
      title: Ack
      oneOf:
        - $ref: 'https://schema.beckn.io/Ack/v2.0'
        - type: object
          properties:
            status:
              description: ACK if the request was accepted; NACK if rejected.
              type: string
              enum:
                - ACK
                - NACK
            signature:
              description: Counter-signature proving the receiver authenticated and processed the inbound request.
              $ref: '#/components/schemas/CounterSignature'
            error:
              description: Optional error detail explaining why no callback will follow.
              $ref: '#/components/schemas/Error'
          required:
            - status
            - signature

  securitySchemes:
    BecknSignature:
      type: http
      scheme: signature
      description: |
        **Beckn HTTP Signature** — Ed25519 asymmetric signature over the request body.

        Verified by the Publish API service using the
        [`beckn-auth-sdk`](https://github.com/manjudr/beck-auth-sdk) against the
        Beckn Registry (`REGISTRY_BASE_URL`). The registry holds each subscriber's
        Ed25519 public key.

        Controlled by the `SIGNATURE_AUTH_ENABLED` environment variable
        (default `true` in production; can be disabled for local development).

        **Endpoints protected (Publish API — applies to all `/beckn/*` routes):**
        `POST /catalog/subscribe`, `GET /catalog/subscriptions`,
        `GET /catalog/subscribe/{subscriptionId}`, `DELETE /catalog/subscribe/{subscriptionId}`.

        **Endpoints protected (Catalog Indexer Job — `BecknAuthFilter` on `/*`):**
        `POST /catalog/master/search`, `GET /catalog/master/schemaTypes`,
        `GET /catalog/master/{masterItemId}`, `POST /catalog/pull`,
        `GET /catalog/pull/result/{requestId}/{filename}`.

        ---

        ### Authorization Header Format

        ```
        Authorization: Signature keyId="{subscriberId}|{uniqueKeyId}|ed25519",
                                  algorithm="ed25519",
                                  created="{unix_epoch_seconds}",
                                  expires="{unix_epoch_seconds}",
                                  headers="(created) (expires) digest",
                                  signature="{base64_ed25519_signature}"
        ```

        | Parameter | Description |
        |-----------|-------------|
        | `keyId` | `{subscriberId}\|{uniqueKeyId}\|ed25519` — all three segments required |
        | `algorithm` | Always `ed25519` |
        | `created` | Unix timestamp (seconds) when the signature was created |
        | `expires` | Unix timestamp (seconds) when the signature expires |
        | `headers` | Always `(created) (expires) digest` |
        | `signature` | Base64-encoded Ed25519 signature of the signing string |

        ### Signing String

        ```
        (created): {unix_epoch_seconds}
        (expires): {unix_epoch_seconds}
        digest: BLAKE-512={base64_blake2b512_hash_of_body}
        ```

        The digest is a **BLAKE2b-512** hash of the raw request body, Base64-encoded.

        ### Error Responses

        | HTTP | `errorCode` | Cause |
        |------|-------------|-------|
        | 400 | `SEC_SIGNATURE_MISSING` | `Authorization` header absent |
        | 400 | `INVALID_REQUEST` | Header present but malformed |
        | 401 | `SEC_SIGNATURE_INVALID` | Signature does not verify, expired, or created in future |
        | 401 | `SEC_KEY_NOT_FOUND` | Key ID not found in registry |
        | 401 | `SEC_KEY_EXPIRED_OR_REVOKED` | Public key expired in registry |
        | 401 | `SEC_SUBSCRIBER_NOT_FOUND` | Subscriber not registered |
        | 401 | `SEC_UNAUTHORIZED_ACTION` | Other auth failure |
        | 500 | `NET_INTERNAL_ERROR` | Registry unreachable or timed out |

        ### Whitelisting

        Endpoints can be exempted per-deployment via the
        `SIGNATURE_WHITELISTED_ENDPOINTS` env var
        (comma-separated `METHOD:/path` entries, e.g. `GET:/catalog/subscribe/:subscriptionId`).

  responses:
    Ack:
      description: Synchronous receipt acknowledgement returned for every accepted Beckn request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckSchema'

    AckNoCallback:
      description: |
        Request received but no callback will follow (e.g. agents not found,
        inventory unavailable, provider closed, context.try preview complete).
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/AckSchema'
              - required:
                  - status
                  - signature
                  - error


    NackBadRequest:
      description: 'NACK — Bad Request: Malformed or invalid request; the server could not parse or validate the payload.'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/AckSchema'
              - type: object
                properties:
                  status:
                    type: string
                    const: NACK
                  error:
                    $ref: '#/components/schemas/Error'

    NackUnauthorized:
      description: Invalid or missing authentication credentials; signature could not be verified.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/AckSchema'
              - type: object
                properties:
                  status:
                    type: string
                    const: NACK
                  error:
                    $ref: '#/components/schemas/Error'

    ServerError:
      description: |
        Internal failure on the network participant's application; the request could not be processed.
        The response body MAY contain an `error` object with additional details.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/Error'

webhooks:
  on_catalog_pull:
    post:
      operationId: onCatalogPull
      tags: [Catalog Pull]
      summary: Async pull result callback
      description: |
        POSTed by the Catalog Indexer Job to `{context.bapUri}/on_catalog_pull`
        when pull processing completes.

        The BAP must expose this endpoint and return `{"status":"ACK"}` (HTTP 200).
        An HTTP 409 response is treated as AckNoCallback — logged and skipped, not an error.

        Exactly one of `message.catalog` (inline) or `message.objectUrl` (large file)
        will be non-null when `message.status` is `COMPLETED`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/PullCallbackContext'
                message:
                  type: object
                  required: [requestId, status]
                  properties:
                    requestId:
                      type: string
                      format: uuid
                      description: Echoed from the pull ACK response
                    status:
                      type: string
                      enum: [COMPLETED, PROCESSING, FAILED]
                      description: |
                        - `COMPLETED` — result available inline or via `objectUrl`.
                        - `PROCESSING` — still running (intermediate callback, rare).
                        - `FAILED` — pull failed; no catalog data.
                    catalog:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                      description: Inline catalog data — present when payload is below the inline threshold
                    objectUrl:
                      $ref: '#/components/schemas/PullObjectUrl'
      responses:
        '200':
          description: ACK — callback received
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ACK
        '409':
          description: AckNoCallback — logged and skipped by Catalg, not retried
