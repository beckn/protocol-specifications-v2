      type: object
      properties:
        id:
          description: Identifier of the form that was submitted. Typically the form's URL or the value of the form's url field.
          type: string
          format: uri
        submissionId:
          description: Unique identifier for this form submission instance.
          type: string
          format: uuid
        data:
          description: Key-value map of form field names to submitted values. Keys correspond to the field identifiers defined in the form; values are the user's responses as strings.
          type: object
          additionalProperties:
            type: string
        submittedAt:
          description: Timestamp at which the form was submitted, in RFC 3339 / ISO 8601 format.
          type: string
          format: date-time
      required:
      - data
      additionalProperties: false
    Participant:
      type: object
      properties:
        id:
          type: string
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        participantAttributes:
          description: 'Domain-specific extension attributes for this contract.

            Use beckn:LogisticsContract for hyperlocal physical delivery. Use the generic Attributes schema for

            other fulfillment types where no well-known domain schema exists.'
          allOf:
          - $ref: '#/components/schemas/Attributes'
          - properties: {}
    GeoJSONGeometry:
      description: "**GeoJSON geometry** per RFC 7946. Coordinates are in **EPSG:4326 (WGS-84)** and MUST follow **[longitude, latitude, (altitude?)]** order.\nSupported types: - Point, LineString, Polygon - MultiPoint, MultiLineString, MultiPolygon - GeometryCollection (uses `geometries` instead of `coordinates`)\nNotes: - For rectangles, use a Polygon with a single linear ring where the first\n and last positions are identical.\n- Circles are **not native** to GeoJSON. For circular searches, use\n `SpatialConstraint` with `op: s_dwithin` and a Point + `distanceMeters`,\n or approximate the circle as a Polygon.\n- Optional `bbox` is `[west, south, east, north]` in degrees."
      title: GeoJSONGeometry
      type: object
      properties:
        bbox:
          description: Optional bounding box `[west, south, east, north]` in degrees.
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: number
        coordinates:
          description: Coordinates per RFC 7946 for all types **except** GeometryCollection. Order is **[lon, lat, (alt)]**. For Polygons, this is an array of linear rings; each ring is an array of positions.
          type: array
          items: {}
        geometries:
          description: Member geometries when `type` is **GeometryCollection**.
          type: array
          items:
            $ref: '#/components/schemas/GeoJSONGeometry'
        type:
          type: string
          enum:
          - Point
          - LineString
          - Polygon
          - MultiPoint
          - MultiLineString
          - MultiPolygon
          - GeometryCollection
      required:
      - type
      additionalProperties: true
    Performance:
      description: 'Generalized execution/performance unit. This is where downstream objects bind:

        - Fulfillment-like details (where/when/how)

        - Tracking handles

        - Support touchpoints

        - Status updates


        A minimal envelope that carries identity, status, and a performanceAttributes

        bag that holds the concrete domain-specific delivery schema.


        Domain specification authors can attach rich context and types via `performanceAttributes`.


        For example, Hyperlocal delivery details (pickup/delivery locations, items shipped, agent, etc.)

        are placed inside performanceAttributes using a well-known domain schema such as

        HyperlocalDelivery. Use the generic Attributes schema when no well-known

        domain schema exists.'
      title: Fulfillment
      x-tags:
      - common
      - fulfillment
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for this fulfillment record.
        status:
          $ref: '#/components/schemas/Descriptor'
          description: Current status of this fulfillment, expressed as a Descriptor. Use Descriptor.code for machine-readable status values.
        commitmentIds:
          type: array
          items:
            $ref: '#/components/schemas/Commitment/properties/id'
        performanceAttributes:
          description: Domain-specific extension attributes for this fulfillment. Use beckn:HyperlocalDelivery (aligned with schema:ParcelDelivery) for hyperlocal physical delivery. Use the generic Attributes schema for other fulfillment types where no well-known domain schema exists.
          $ref: '#/components/schemas/Attributes'
      additionalProperties: false
    RequestDigest:
      title: Request Payload Digest
      description: 'A cryptographic binding that explicitly ties a callback to the

        specific inbound request that triggered it. Establishes bilateral non-repudiation

        for the asynchronous leg of a Beckn interaction.


        Use `lineage` (on `Context`) for cross-transaction causality.


        Verification steps:

        1. Recompute BLAKE2b-512 digest of the original request body; compare to `digest`.

        2. Confirm `messageId` matches the `messageId` from the original request `Context`.'
      type: object
      required:
      - digest
      properties:
        digest:
          type: string
          pattern: ^BLAKE-512=[A-Za-z0-9+/]+=*$
          description: 'BLAKE2b-512 hash of the parent request body, Base64-encoded with algorithm prefix.

            Format: `BLAKE-512={base64EncodedHash}`'
    Intent:
