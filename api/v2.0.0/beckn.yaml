          $ref: '#/components/schemas/FormSubmission'
      required:
      - target
      - range
      additionalProperties: false
    Resource:
      type: object
      description: "A minimal, domain-neutral abstraction representing any discoverable,\nreferenceable, or committable unit of value, capability, service,\nentitlement, or asset within the network.\n\nExamples:\n- A retail product SKU, a mobility ride, a job role, a carbon credit unit,\n a dataset/API entitlement, a training course, a clinic service slot.\n\nDesigned for composability through `resourceAttributes` where\ndomain packs can plug in their specific fields without changing the core."
      required:
      - id
      properties:
        id:
          type: string
          description: Globally unique identifier of the resource.
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        resourceAttributes:
          description: All the properties of a resource that describe its value, its terms of usage, fulfillment, and consideration
          $ref: '#/components/schemas/Attributes'
    Settlement:
      type: object
      properties:
        id:
          type: string
        considerationId:
          $ref: '#/components/schemas/Consideration/properties/id'
        status:
          type: string
          enum:
          - DRAFT
          - COMMITTED
          - COMPLETE
        settlementAttributes:
          $ref: '#/components/schemas/Attributes'
    Signature:
      title: Beckn HTTP Signature
      description: "A digitally signed authentication credential in the HTTP `Authorization` header.\nFollows draft-cavage-http-signatures-12 as profiled by BECKN-006.\n\nformat:\n```\nSignature keyId=\"{subscriberId}|{uniqueKeyId}|{algorithm}\",\n algorithm=\"{algorithm}\",created=\"{unixTimestamp}\",expires=\"{unixTimestamp}\",\n headers=\"{signedHeaders}\",signature=\"{base64Signature}\"\n```\n\n| Attribute | Description |\n|-----------|-------------|\n| `keyId` | `{subscriberId}|{uniqueKeyId}|{algorithm}` — FQDN, registry UUID, algorithm |\n| `algorithm` | MUST be `ed25519` |\n| `created` | Unix timestamp when the signature was created |\n| `expires` | Unix timestamp when the signature expires |\n| `headers` | Space-separated signed headers. MUST include `(created)`, `(expires)`, `digest` |\n| `signature` | Base64-encoded Ed25519 signature over the signing string |\n\nSigning string:\n`(created): {value}\\n(expires): {value}\\ndigest: BLAKE-512={digest}`\nwhere `digest` is a BLAKE2b-512\
        \ hash of the request body, Base64-encoded."
      type: string
      pattern: ^Signature keyId="[^|"]+\|[^|"]+\|[^"]+",algorithm="[^"]+",created="\d+",expires="\d+",headers="[^"]+",signature="[A-Za-z0-9+/]+=*"$
    Support:
      description: Describes a support session info
      title: Support
      type: object
      properties:
        orderId:
          description: The order against which support is required
          type: string
        descriptor:
          description: A description of the nature of support needed
          $ref: '#/components/schemas/Descriptor'
        channels:
          description: Available support channels described in individual linked data JSON objects
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Attributes'
      additionalProperties: false
    SpatialConstraint:
      description: "**Spatial predicate** using **OGC CQL2 (JSON semantics)** applied to one or more geometry targets in an item. This is where clients express spatial intent.\nKey ideas: - `targets`: one or more **JSONPath-like** pointers that locate geometry\n\n  fields within each item document (e.g., `$['availableAt'][*]['geo']`).\n- `op`: spatial operator (CQL2). Common ones:\n\n    • `S_WITHIN`     (A is completely inside B)\n    • `S_INTERSECTS` (A intersects B)\n    • `S_CONTAINS`   (A contains B)\n    • `S_DWITHIN`    (A within distance of B)\n- `geometry`: **GeoJSON** literal used as the predicate reference geometry. - `distanceMeters`: required for `S_DWITHIN` when using a GeoJSON Point/shape. - `quantifier`: if a target resolves to an array, choose whether **ANY** (default),\n\n  **ALL**, or **NONE** of elements must satisfy the predicate.\n\nCRS: unless otherwise stated, all coordinates are **EPSG:4326**.\n"
      title: SpatialConstraint
      type: object
      properties:
        op:
          description: OGC CQL2 spatial operator.
          type: string
          enum:
          - S_WITHIN
          - S_CONTAINS
          - S_INTERSECTS
          - S_DISJOINT
          - S_OVERLAPS
          - S_CROSSES
          - S_TOUCHES
          - S_EQUALS
          - S_DWITHIN
        targets:
          description: '''One or more JSONPath-like pointers to geometry fields within the item.  Example pointers:  - `$[''''availableAt''''][*][''''geo'''']` (array of site Points)  - `$[''''itemAttributes''''][''''ride:dropOff''''][''''geo'''']` (drop zone Polygon)''

            '
          oneOf:
          - type: string
          - type: array
            items:
              type: string
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        distanceMeters:
          description: 'For `S_DWITHIN`: maximum distance in meters from the target geometry to `geometry` (e.g., "within 5000 m of this Point"). Ignored for other ops.'
          type: number
          minimum: 0
        quantifier:
          description: '''How to evaluate when `targets` resolves to an array - - **any**: at least one element matches (default) - **all**: every element must match  - **none**: no element may match''

            '
          type: string
          enum:
          - ANY
          - ALL
          - NONE
          default: any
        srid:
          description: Coordinate Reference System identifier for `geometry`. Default is `"EPSG:4326"`. If provided, servers MAY reproject to EPSG:4326 internally.
          type: string
          example: EPSG:4326
      required:
      - op
      - targets
      additionalProperties: false
      x-tags:
      - common
    TimePeriod:
