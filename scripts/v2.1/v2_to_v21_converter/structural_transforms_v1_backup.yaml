# Structural Transformation Rules for Beckn v2.0 → v2.1
# These rules handle complex structural transformations that cannot be expressed
# through pure IRI/ontology mappings alone.

version: "2.0_to_2.1"
description: "Structural transformation rules for complex JSON restructuring"

rules:
  # Rule 1: buyer.displayName → consumer.person.name
  # In v2.0, buyer is an object with displayName. In v2.1, name goes to consumer.person.name
  - name: "buyer_displayName_to_consumer_person_name"
    description: "Transform buyer.displayName to consumer.person.name"
    enabled: true
    source_path: "$.message.order.buyer.displayName"
    target_path: "$.message.order.consumer.person.name"
    transform_type: "nested_path"
    value_mapping: "identity"
    notes: "buyer.displayName → consumer.person.name"
  
  # Rule 1b: Move entire buyer object to consumer.person (keep other properties)
  - name: "buyer_to_consumer_person"
    description: "Transform buyer object to consumer.person structure"
    enabled: true
    source_path: "$.message.order.buyer"
    target_path: "$.message.order.consumer.person"
    transform_type: "nested_path"
    value_mapping: "identity"
    notes: "buyer object → consumer.person in v2.1"

  # Rule 2: seller → provider.descriptor.id
  # In v2.0, seller is a simple string. In v2.1, it's nested under provider.descriptor.id
  - name: "seller_to_provider_descriptor_id"
    description: "Transform seller to provider.descriptor.id"
    enabled: true
    source_path: "$.message.order.seller"
    target_path: "$.message.order.provider.descriptor.id"
    transform_type: "nested_path"
    value_mapping: "identity"
    notes: "seller is deprecated in v2.1; use provider.descriptor.id instead"

  # Rule 3: payment object splitting
  # In v2.0, payment is a single object. In v2.1, it splits into paymentAction and paymentTerms
  - name: "split_payment_object"
    description: "Split payment into paymentAction and paymentTerms"
    enabled: true
    source_path: "$.message.order.payment"
    transform_type: "object_split"
    target_objects:
      # Properties that describe the payment action/transaction
      paymentAction:
        target_path: "$.message.order.paymentAction"
        properties:
          - "method"
          - "amount"
          - "paymentURL"
          - "txnRef"
          - "paidAt"
          - "paymentStatus"
          - "paymentAttributes"
          - "beneficiary"
      # Properties that describe payment terms/conditions
      paymentTerms:
        target_path: "$.message.order.paymentTerms"
        properties:
          - "collectedBy"
          - "settlementTerms"
          - "checkoutAt"
          - "checkoutTrigger"
          - "paymentTermsAttributes"
    notes: |
      In v2.1, payment semantics are split:
      - paymentAction: The act of payment (method, status, transaction details)
      - paymentTerms: Terms and conditions (collection, settlement, triggers)

  # Rule 4: payment.collectedBy → paymentTerms.collectedBy
  # This is handled by Rule 3 above, but we can add specific property routing if needed
  - name: "payment_collectedBy_to_paymentTerms"
    description: "Ensure collectedBy moves from payment to paymentTerms"
    enabled: true
    source_path: "$.message.order.payment.collectedBy"
    target_path: "$.message.order.paymentTerms.collectedBy"
    transform_type: "property_relocation"
    value_mapping: "identity"
    notes: "collectedBy belongs in paymentTerms domain in v2.1"
    depends_on: "split_payment_object"

# Additional rules for other common transformations
additional_rules:
  # Handle fulfillment status changes
  - name: "fulfillmentStatus_to_currentFulfillmentState"
    description: "Transform fulfillmentStatus to currentFulfillmentState descriptor"
    enabled: true
    source_path: "$.message.order.fulfillments[*].fulfillmentStatus"
    target_path: "$.message.order.fulfillments[*].currentFulfillmentState"
    transform_type: "nested_path"
    value_mapping: "wrap_in_descriptor"
    notes: "In v2.1, state is represented as a descriptor object"

# Global settings
settings:
  # Order of rule application (sequential)
  execution_order:
    - "split_payment_object"
    - "buyer_to_consumer_person"
    - "seller_to_provider_descriptor_id"
    - "payment_collectedBy_to_paymentTerms"
  
  # What to do with source properties after transformation
  remove_source_after_transform: true
  
  # How to handle conflicts
  conflict_resolution: "prefer_target"
  
  # Create intermediate objects if they don't exist
  create_intermediate_objects: true
