openapi: 3.1.1
info:
  title: Beckn Support Schema
  description: Schema definition for Support in the Beckn Protocol v2.1
  version: 2.1.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    SupportInfo:
      description: Canonical support contact for an entity, mapped to schema.org ContactPoint.
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          const: beckn:SupportInfo
        channels:
          description: Available support channels.
          type: array
          items:
            type: string
            enum:
            - PHONE
            - EMAIL
            - WEB
            - CHAT
            - WHATSAPP
            - IN_APP
            - OTHER
        email:
          description: Support email address.
          type: string
          format: email
        hours:
          description: Human-readable support hours (local time).
          type: string
        name:
          description: Name of the support organization or contact.
          type: string
        phone:
          description: Telephone number.
          type: string
        url:
          description: Webpage or chat endpoint for support.
          type: string
          format: uri
      required:
      - '@context'
      - "@type"
      additionalProperties: false
      examples:
        - $ref: '../../examples/v2.1/SupportInfo.examples.yaml#/basic'

    SupportTicket:
      type: object
      description: A support ticket raised against an order
      properties:
        id:
          description: Ticket ID
          type: string
        supportTicketAttributes:
          $ref: '#/components/schemas/Attributes'
