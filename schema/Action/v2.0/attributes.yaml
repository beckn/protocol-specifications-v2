openapi: 3.1.1
info:
  version: 2.0.0
components:
  schemas:
    Action:
      title: Beckn Action
      description: Beckn protocol action identifier. Standard action values are maintained in an external repository. Additional actions may be added by implementations for domain-specific use cases.
      type: string
      # Pattern rules:
      # - MUST start with prefix "beckn/"
      # - lowercase only
      # - segments separated by "/" (any depth)
      # - no leading "/" and no trailing "/"
      # - no consecutive "//"
      # - allowed chars inside a segment: lowercase letters and underscores only
      # - no digits, no hyphens, no dots, no colons, no spaces
      pattern: '^beckn\/[a-z_]+(?:\/[a-z_]+)*$'
      x-jsonld:
        '@id': beckn:Action
        '@type': '@id'
      examples: 
        - beckn/discover
        - beckn/on_discover
        - beckn/catalog/publish
        - beckn/catalog/on_publish
