openapi: 3.1.1
info:
  title: Beckn Fulfillment Schema
  description: Schema definition for Fulfillment in the Beckn Protocol v2.1
  version: 2.1.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Fulfillment:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Fulfillment
          x-jsonld:
            '@id': schema:Thing
        agent:
          description: 'The entity that directly performs the fulfillment'
          allOf:
            - $ref: '#/components/schemas/FulfillmentAgent'
        fulfillmentAttributes:
          description: 'Extensible set of domain-specific attributes describing the fulfillment'
          allOf:
            - $ref: '#/components/schemas/Attributes'
        id:
          description: Fulfillment identifier
          type: string
          x-jsonld:
            '@id': schema:identifier
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/Descriptor'
        mode:
          description: 'Extensible set of attributes describing the mode of fulfillment. Varies with Industry Use Case'
          allOf:
            - $ref: '#/components/schemas/FulfillmentMode'
          x-jsonld:
            '@id': beckn:FulfillmentMode  
        participants:
          description: A list of participants who are entitled to receive the fulfillment of the order. By default, it is the consumer who placed the order  
          type: array
          items:
            $ref: '#/components/schemas/Participant'
          minItems: 1
        state:
          description: 'The current state of fulfillment'
          allOf:
            $ref: '#/components/schemas/State'
        stages:
          description: 'The various stages of the fulfillment'
          type: array
          items:
            $ref: '#/components/schemas/FulfillmentStage'
          minItems: 1
        trackingEnabled:
          description: Whether tracking is enabled / possible for this fulfillment
          type: boolean
      required:
      - '@context'
      - "@type"
      - mode
      additionalProperties: false

    FulfillmentAgent:
      description: The entity directly involved in fulfilling the order. It could be a person, an organization, a machine, a software application, or an AI Agent.
      allOf:
        - type: object
          additionalProperties: false
          properties:
            "@context":
              description: CPD
              type: string
              format: uri
              const: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld"
            "@type":
              type: string
              const: "beckn:Agent"
              x-jsonld:
                "@id": "schema:Thing"
            agentAttributes:
              description: >
                Attribute Pack reference for richer identity:
                # agent/identity.v1 (contact details: email, phone, address)
                # agent/org-ids.v1 (LEI, GSTIN, ISIN, CUSIP…)
                # consumer/kyc.v1 (jurisdictional compliance fields)
                # (accessibility needs, etc.)
              $ref: "#/components/schemas/Attributes"
          required:
            - "@context"
            - "@type"

        - oneOf:
            - type: object
              additionalProperties: false
              properties:
                person:
                  $ref: "#/components/schemas/Person"
              required: ["person"]

            - type: object
              additionalProperties: false
              properties:
                organization:
                  $ref: "#/components/schemas/Organization"
              required: ["organization"]

    FulfillmentMode:
      type: object
      description: Describes the mode of fulfillment. This is an extensible container allowing domain-specific fulfillment modes to be expressed via attributes.
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentMode
        id:
          type: string
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        modeAttributes:
          description: Domain-specific fulfillment mode attributes (e.g., delivery, pickup, reservation, digital)
          allOf:
            - $ref: '#/components/schemas/Attributes'
      additionalProperties: false

    FulfillmentStage:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentStageEndpoint
        id:
          description: A unique identifier for this stage of fulfillment
          type: string
        instructions:
          description: A set of instructions to follow during this stage of fulfillment
          type: array
          items:
            $ref: '#/components/schemas/Instruction'
        preferences:
          description: A extensible set of attributes that describe the fulfillment preferences
          type: array
          items:
            $ref: '#/components/schemas/Attributes'
        start:
          description: An extensible set of attributes that describe the criteria required to start this stage of fulfillment
          type: object
          allOf: 
            $ref: '#/components/schemas/FulfillmentStageEndpoint'
        end:
          description: An extensible set of attributes that describe the criteria required to end this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/FulfillmentStageEndpoint'
        fulfillmentStageAttributes:
          description: An extensible set of attributes that describe this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/Attributes'
      x-jsonld:
        '@id': beckn:fulfillmentStage
      required:
      - '@context'
      - "@type"
      - id
      - location
      additionalProperties: false
    
    FulfillmentStageEndpoint:
      type: object
      additionalProperties: false
      description: >
        A stage boundary endpoint (entry or exit) within a fulfillment, such as pickup,
        handover, warehouse in/out, border crossing, gate entry/exit, security check, etc.
        May require one or more proofs/permits/tokens/documents.
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentStageEndpoint
        location:
          $ref: '#/components/schemas/Location'
        time:
          $ref: '#/components/schemas/TimePeriod'
        authorization:
          type: array
          description: >
            One or more credentials required and/or issued at this endpoint.
            Includes machine-readable tokens (QR/URL/OTP) and manual documents (IDs, permits).
          items:
            $ref: '#/components/schemas/FulfillmentStageAuthorization'
    
    FulfillmentStageAuthorization:
      type: object
      additionalProperties: false
      description: >
        A credential/document/proof relevant to authorization at a fulfillment stage endpoint.
        This may be a token to be verified (QR/OTP/URL) or a document to be inspected manually.
      required:
        - purpose
        - requirement
        - status
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentStageAuthorization
        mediaFiles:
          description: Media files required to enter or exit this fulfillment stage. The could be images of delivered packages, recorded video proof of installation, etc
          type: array
          items:
            $ref: '#/components/schemas/MediaFile'
        docs:
          description: Documents required to enter or exit this fulfillment stage. The could be entry tickets, boarding passes, waybill, permits, certificates, credentials, etc
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Document'
        authToken:
          type: string
          description: A human readable string that needs to be provided to enter or exit this fulfillment stage. Like an OTP
