openapi: 3.1.1
info:
  title: Beckn Ack Schema v2.0
  description: Acknowledgment response schema for Beckn Protocol v2.0
  version: 2.0.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en

components:
  schemas:
    AckResponse:
      type: object
      properties:
        ackStatus:
          type: string
          enum:
          - ACK
          - NACK
        error:
          $ref: '#/components/schemas/Error'
        timestamp:
          type: string
          format: date-time
        transactionId:
          type: string
      required:
      - transactionId
      - timestamp
      - ackStatus
      additionalProperties: false
      allOf:
      - if:
          properties:
            ackStatus:
              const: NACK
          required:
          - ackStatus
        then:
          required:
          - error
      - if:
          properties:
            ackStatus:
              const: ACK
          required:
          - ackStatus
        then:
          not:
            required:
            - error

    Error:
      type: object
      properties:
        code:
          description: Error code
          type: string
          example: INVALID_SCHEMA_FIELD
        details:
          description: Additional error details
          type: object
        message:
          description: Human-readable error message
          type: string
          example: Field 'electronic:invalidField' not found in ElectronicItem schema
      required:
      - code
      - message
